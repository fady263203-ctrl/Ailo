// ── XP SYSTEM ────────────────────────────────────────────────────────────────
const xpForLevel = (lvl) => lvl === 1 ? 100 : xpForLevel(lvl-1) + lvl * 100;
const getLevelInfo = (totalXp) => {
  let lvl = 1, acc = 0;
  while (acc + xpForLevel(lvl) <= totalXp) { acc += xpForLevel(lvl); lvl++; }
  return { level:lvl, current:totalXp-acc, needed:xpForLevel(lvl), pct:Math.round(((totalXp-acc)/xpForLevel(lvl))*100) };
};

// ── ANIMATED XP BAR ───────────────────────────────────────────────────────────
function XPBar({ pct, color, accent }) {
  const [w, setW] = useState(0);
  useEffect(()=>{ const t = setTimeout(()=>setW(pct),400); return ()=>clearTimeout(t); }, [pct]);
  const barColor = pct>75 ? (accent||"#f59e0b") : color;
  return (
    <div style={{height:8,background:"rgba(0,0,0,0.1)",borderRadius:50,overflow:"hidden",position:"relative"}}>
      <div style={{width:`${w}%`,height:"100%",background:`linear-gradient(90deg,${color},${barColor})`,borderRadius:50,transition:"width 1s cubic-bezier(.4,0,.2,1)",boxShadow:w>0?`0 0 12px ${barColor}66`:undefined}}/>
    </div>
  );
}

// ── MINI CHART ────────────────────────────────────────────────────────────────
function WeekChart({ data, color }) {
  const max = Math.max(...data);
  const days = ["أح","إث","ث","أر","خ","ج","س"];
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:8,height:64,padding:"0 4px"}}>
      {days.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{width:"100%",height:50,display:"flex",alignItems:"flex-end"}}>
            <div style={{width:"100%",height:`${(data[i]/max)*100}%`,background:i===6?`linear-gradient(180deg,${color},${color}88)`:`${color}44`,borderRadius:"4px 4px 0 0",transition:"height 1s ease",minHeight:4,boxShadow:i===6?`0 0 10px ${color}66`:undefined}}/>
          </div>
          <span style={{fontSize:9,opacity:0.5}}>{d}</span>
        </div>
      ))}
    </div>
  );
}

      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes pulse{to{transform:scale(1.6);opacity:.2}} @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}} @keyframes dot0{0%,100%{transform:translateY(0)}33%{transform:translateY(-5px)}} @keyframes dot1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}} @keyframes dot2{0%,100%{transform:translateY(0)}66%{transform:translateY(-5px)}} @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );

  // ── MAIN APP ───────────────────────────────────────────────────────────────
  return (
    <div style={{background:t.bg,minHeight:"100vh",color:textCol,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",paddingBottom:72,position:"relative",overflow:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>

      {/* Ambient glow */}
      <div style={{position:"fixed",top:-100,right:-100,width:300,height:300,borderRadius:"50%",background:t.glow,filter:"blur(80px)",pointerEvents:"none",zIndex:0}}/>

      {/* XP POPUP */}
      {xpPopup && (
        <div style={{position:"fixed",top:90,left:"50%",background:`linear-gradient(135deg,${t.primary},${t.secondary})`,color:"white",padding:"8px 20px",borderRadius:50,fontWeight:700,fontSize:13,zIndex:400,animation:"fadeUp 0.4s ease",pointerEvents:"none",boxShadow:`0 4px 20px ${t.glow}`,display:"flex",alignItems:"center",gap:6}}>

      {/* HEADER */}
      <div style={{background:t.card,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:`1px solid ${t.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:50,boxShadow:`0 4px 24px rgba(0,0,0,0.08)`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setShowProfile(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}>
            <AvatarDisplay src={profile.avatar} size={40}/>

          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:900,fontSize:22,background:`linear-gradient(135deg,${t.primary},${t.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:1}}>✦ Ailo</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setShowNotifPanel(p=>!p)} style={{background:`${t.primary}18`,border:`1px solid ${t.border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex",position:"relative"}}>

              <div style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:3.5,background:"#ef4444",boxShadow:"0 0 6px #ef4444"}}/>
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:`${t.primary}18`,border:`1px solid ${t.border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>

        {/* XP / Stats Row */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>

          </div>
          <div style={{flex:1}}>
            <XPBar pct={lvl.pct} color={t.primary} accent={t.accent}/>

          <span style={{fontSize:10,color:t.muted,flexShrink:0}}>{lvl.current}/{lvl.needed}</span>
          <div style={{display:"flex",alignItems:"center",gap:3,background:`rgba(245,158,11,0.15)`,borderRadius:50,padding:"3px 8px",flexShrink:0}}>
            {Ic.coin("#f59e0b",13)}<span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{coins}</span>
          </div>
          <div style={{background:"rgba(239,68,68,0.15)",borderRadius:50,padding:"3px 8px",fontSize:11,fontWeight:700,color:"#ef4444",display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
            🔥{streak}
          </div>
        </div>
      </div>

      {/* NOTIF PANEL */}
      {showNotifPanel && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",zIndex:100}} onClick={()=>setShowNotifPanel(false)}>
          <div style={{...glassCard({margin:"70px 14px 0",padding:18}),borderRadius:20}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,marginBottom:14,fontSize:15}}>🔔 الإشعارات</div>
            {[
              {icon:"💬",text:"Alex أرسل لك رسالة",time:"منذ 2 دقيقة"},
              {icon:"🏆",text:"وصلت للمرتبة الثالثة!",time:"منذ ساعة"},
              {icon:"🎁",text:"مكافأة يومية جاهزة",time:"منذ 3 ساعات"},
            ].map((n,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<2?`1px solid ${t.border}`:"none"}}>

                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500}}>{n.text}</div>
                  <div style={{fontSize:11,color:t.muted,marginTop:2}}>{n.time}</div>
                </div>
                <button onClick={()=>setNotifMuted(m=>[...m,i])} style={{background:`${t.primary}18`,border:`1px solid ${t.border}`,borderRadius:50,padding:"3px 10px",fontSize:10,cursor:"pointer",color:t.primary,fontFamily:"'Tajawal',system-ui"}}>

                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CONTENT */}
      <div style={{padding:"14px",position:"relative",zIndex:1}}>

        {/* ── HOME ──────────────────────────────────────────────── */}
        {tab==="home" && (
          <div style={{animation:"slideIn 0.4s ease"}}>
            {/* Profile Hero */}
            <div style={{...glassCard({marginBottom:14,padding:"20px",background:`linear-gradient(135deg,${t.primary}22,${t.accent}11)`})}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <AvatarDisplay src={profile.avatar} size={58}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>{profile.name}</div>
                  <div style={{color:t.muted,fontSize:12,marginBottom:6}}>{profile.status}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <div style={tag(t.primary)}>{profile.lang}</div>
                    <div style={tag("#22c55e")}>Lv.{lvl.level}</div>
                  </div>
                </div>
                {Ic.sparkle(t.primary,18)}
              </div>
            </div>

            {/* Daily Quests */}
            <div style={{...glassCard({marginBottom:14})}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{Ic.zap(t.primary,16)}<span>المهام اليومية</span></div>
                <div style={tag("#f59e0b")}>🎁 صندوق مكافآت</div>
              </div>
              {DAILY_QUESTS.map(q=>(

                    <div style={{fontSize:13,color:q.done?"#22c55e":textCol,textDecoration:q.done?"line-through":"none",fontWeight:q.done?400:500}}>{q.text}</div>
                    <div style={{height:4,background:`${t.border}`,borderRadius:2,marginTop:5,overflow:"hidden"}}>
                      <div style={{width:`${(q.progress/q.total)*100}%`,height:"100%",background:q.done?`linear-gradient(90deg,#22c55e,#4ade80)`:`linear-gradient(90deg,${t.primary},${t.secondary})`,borderRadius:2,transition:"width 0.8s ease"}}/>
                    </div>
                  </div>
                  <div style={tag("#f59e0b",{flexShrink:0})}>+{q.reward}XP</div>
                </div>
              ))}
            </div>

            {/* Start Chat */}
            <div style={{fontWeight:800,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:6,opacity:0.8}}>
              {Ic.zap(t.primary,14)}<span>ابدأ محادثة</span>
            </div>
            {[
              {type:"video",icon:"📹",title:"مكالمة فيديو",    desc:"تحدث وجهاً لوجه", grad:`linear-gradient(135deg,#6366f155,#818cf833)`},
              {type:"voice",icon:"📞",title:"مكالمة صوتية",    desc:"حسّن نطقك",        grad:`linear-gradient(135deg,#22c55e55,#4ade8033)`},
              {type:"text", icon:"💬",title:"دردشة نصية",      desc:"تبادل الرسائل",   grad:`linear-gradient(135deg,#f59e0b55,#fbbf2433)`},
            ].map(c2=>(
              <button key={c2.type} onClick={()=>startSearch(c2.type)} style={{width:"100%",...glassCard({padding:16,display:"flex",alignItems:"center",gap:14,cursor:"pointer",marginBottom:10,textAlign:"right",background:c2.grad,transition:"transform 0.15s,box-shadow 0.15s"})}} onMouseDown={e=>e.currentTarget.style.transform="scale(0.98)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
                <div style={{width:50,height:50,borderRadius:14,background:`rgba(255,255,255,0.15)`,backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0,border:`1px solid rgba(255,255,255,0.2)`}}>{c2.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15,color:textCol}}>{c2.title}</div>
                  <div style={{color:t.muted,fontSize:12,marginTop:2}}>{c2.desc}</div>
                </div>
                <div style={{color:t.primary,opacity:0.6,fontSize:18}}>‹</div>
              </button>
            ))}

            {/* Stats + Chart */}
            <div style={{...glassCard({marginTop:4})}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                {Ic.sparkle(t.primary,14)}<span>إحصائياتك الأسبوعية</span>
              </div>
              <WeekChart data={WEEK_DATA} color={t.primary}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>
                {[["12","محادثة"],["3.5h","تحدثت"],["48","تمرين"]].map(([n,l])=>(
                  <div key={l} style={{textAlign:"center",background:`${t.primary}18`,border:`1px solid ${t.border}`,borderRadius:14,padding:"12px 6px"}}>
                    <div style={{fontWeight:900,fontSize:20,color:t.primary}}>{n}</div>
                    <div style={{color:t.muted,fontSize:10,marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Badges */}
            <div style={{...glassCard({marginTop:12})}}>
              <div style={{fontWeight:800,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                {Ic.sparkle("#f59e0b",14)}<span>شاراتي</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {BADGES.map(b=>(
                  <div key={b.id} style={{textAlign:"center",padding:"12px 6px",background:b.earned?`${t.primary}18`:`rgba(0,0,0,0.05)`,borderRadius:14,border:`1px solid ${b.earned?t.primary:t.border}`,opacity:b.earned?1:0.4,transition:"all 0.2s",boxShadow:b.earned?`0 0 15px ${t.glow}`:undefined}}>
                    <div style={{fontSize:26}}>{b.icon}</div>
                    <div style={{fontSize:10,fontWeight:700,marginTop:4,color:b.earned?t.primary:t.muted}}>{b.name}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── BOT ───────────────────────────────────────────────── */}
        {tab==="bot" && (
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)",animation:"slideIn 0.4s ease"}}>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
              {botMessages.map(m=>(
                <div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"82%"}}>
                  {m.from==="bot" && <div style={{fontSize:16,marginBottom:4,display:"flex",alignItems:"center",gap:4}}><span>✨</span><span style={{fontSize:11,color:t.muted}}>Ailo AI</span></div>}
                  <div style={{background:m.from==="me"?`linear-gradient(135deg,${t.primary},${t.secondary})`:t.card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":textCol,padding:"11px 16px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.7,border:`1px solid ${t.border}`,boxShadow:m.from==="me"?`0 4px 15px ${t.glow}`:`0 2px 10px rgba(0,0,0,0.06)`}}>
                    {m.text}
                  </div>
                </div>
              ))}
              <div ref={botEnd}/>
            </div>
            <div style={{display:"flex",gap:8,paddingTop:8}}>
              <input value={botInput} onChange={e=>setBotInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendBot()} placeholder="اسأل المساعد..." style={{...inp,flex:1}}/>
              <button onClick={sendBot} style={{width:44,height:44,borderRadius:22,background:`linear-gradient(135deg,${t.primary},${t.secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 15px ${t.glow}`}}>
                {Ic.send("white")}
              </button>
            </div>
          </div>
        )}

        {/* ── HISTORY ───────────────────────────────────────────── */}
        {tab==="history" && (
          <div style={{animation:"slideIn 0.4s ease"}}>
            <div style={{fontWeight:800,fontSize:15,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>
              {Ic.clock(t.primary,16)}<span>سجل المحادثات</span>
            </div>
            {historyData.map((h,i)=>(
              <div key={h.id} style={{...glassCard({marginBottom:10,display:"flex",alignItems:"center",gap:12,animation:`slideIn 0.3s ease ${i*0.08}s both`})}}>
                <div style={{width:46,height:46,borderRadius:14,background:`${t.primary}22`,border:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                  {h.type==="video"?"📹":h.type==="voice"?"📞":"💬"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{h.partner}</div>
                  <div style={{color:t.muted,fontSize:12,marginTop:2}}>{h.lang} · {h.duration}</div>
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{color:t.muted,fontSize:11}}>{h.date}</div>
                  <div style={{...tag("#22c55e"),marginTop:4}}>+{h.xpGained}XP</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── EXERCISES / SRS ───────────────────────────────────── */}
        {tab==="exercises" && (
          <div style={{animation:"slideIn 0.4s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:6}}>{Ic.star(t.primary,16)}<span>تمارين SRS</span></div>
              <div style={{display:"flex",gap:6}}>
                <div style={tag("#22c55e")}>🏆 {srsScore}</div>
                {srsStreak>1 && <div style={tag("#f59e0b")}>🔥 {srsStreak}</div>}
              </div>
            </div>

            <div style={{...glassCard({marginBottom:12})}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:t.muted,marginBottom:8}}>
                <span>البطاقة {srsIdx+1}/{SRS_CARDS.length}</span>
                <span>{Math.round((srsIdx/SRS_CARDS.length)*100)}% مكتمل</span>
              </div>
              <XPBar pct={Math.round((srsIdx/SRS_CARDS.length)*100)} color={t.primary} accent={t.accent}/>
            </div>

            {(()=>{
              const c3 = SRS_CARDS[srsIdx];
              return (
                <div style={{...glassCard({textAlign:"center",marginBottom:12,padding:"24px 16px",background:`linear-gradient(135deg,${t.primary}18,${t.accent}0a)`})}}>
                  {c3.type==="mcq" && <>
                    <div style={{color:t.muted,fontSize:12,marginBottom:8,letterSpacing:1}}>ترجم إلى العربية</div>
                    <div style={{fontWeight:900,fontSize:38,background:`linear-gradient(135deg,${t.primary},${t.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:20}}>{c3.word}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,textAlign:"right"}}>
                      {c3.options.map((o,i)=>{
                        let bg2=t.card,bc=t.border,col2=textCol,shadow="";
                        if(srsAnswer!==null){
                          if(i===c3.answer){bg2="#22c55e22";bc="#22c55e";col2="#22c55e";shadow="0 0 15px rgba(34,197,94,0.3)";}
                          else if(i===srsAnswer){bg2="#ef444422";bc="#ef4444";col2="#ef4444";}
                        }
                        return <button key={i} onClick={()=>srsAnswer===null&&answerSrs(i)} style={{background:bg2,backdropFilter:"blur(10px)",border:`2px solid ${bc}`,borderRadius:14,padding:"14px 10px",fontWeight:700,fontSize:15,cursor:"pointer",color:col2,transition:"all 0.2s",boxShadow:shadow,fontFamily:"'Tajawal',system-ui"}}>{o}</button>;
                      })}
                    </div>
                  </>}

                  {c3.type==="arrange" && <>
                    <div style={{color:t.muted,fontSize:12,marginBottom:8,letterSpacing:1}}>رتب الكلمات لتكوين جملة</div>
                    <div style={{minHeight:50,background:`rgba(0,0,0,0.1)`,borderRadius:14,padding:10,marginBottom:14,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",border:`1px solid ${t.border}`}}>
                      {arrangeSelected.map((w,i)=>(
                        <button key={i} onClick={()=>{setArrangeSelected(s=>s.filter((_,j)=>j!==i));setArrangeWords(w2=>[...w2,w]);}} style={{background:`linear-gradient(135deg,${t.primary},${t.secondary})`,color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>{w}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:14}}>
                      {arrangeWords.map((w,i)=>(
                        <button key={i} onClick={()=>{setArrangeSelected(s=>[...s,w]);setArrangeWords(w2=>w2.filter((_,j)=>j!==i));}} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:8,padding:"8px 16px",fontSize:14,cursor:"pointer",color:textCol,fontFamily:"'Tajawal',system-ui",backdropFilter:"blur(10px)"}}>{w}</button>
                      ))}
                    </div>
                    {srsAnswer==="wrong" && <div style={{color:"#ef4444",fontSize:12,marginBottom:10}}>الإجابة الصحيحة: {c3.answer}</div>}
                    <button onClick={submitArrange} style={btnPrimary({width:"100%"})}>تحقق ✓</button>
                  </>}

                  {c3.type==="match" && <>
                    <div style={{color:t.muted,fontSize:12,marginBottom:14,letterSpacing:1}}>طابق الكلمات مع معانيها</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {c3.pairs.map(([eng])=>(
                          <button key={eng} onClick={()=>setMatchSelected(eng)} style={{background:matchSelected===eng?`linear-gradient(135deg,${t.primary},${t.secondary})`:matchPairs[eng]?"rgba(34,197,94,0.2)":t.card,border:`2px solid ${matchSelected===eng?t.primary:matchPairs[eng]?"#22c55e":t.border}`,borderRadius:12,padding:"11px",fontSize:14,cursor:"pointer",color:matchPairs[eng]?"#22c55e":matchSelected===eng?"white":textCol,fontWeight:700,backdropFilter:"blur(10px)",transition:"all 0.2s",fontFamily:"'Tajawal',system-ui"}}>{eng}</button>
                        ))}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {[...c3.pairs].sort(()=>Math.random()-0.5).map(([,ar])=>(
                          <button key={ar} onClick={()=>matchSelected&&handleMatch(matchSelected,ar)} style={{background:Object.values(matchPairs).includes(ar)?"rgba(34,197,94,0.2)":t.card,border:`2px solid ${Object.values(matchPairs).includes(ar)?"#22c55e":t.border}`,borderRadius:12,padding:"11px",fontSize:14,cursor:"pointer",color:Object.values(matchPairs).includes(ar)?"#22c55e":textCol,backdropFilter:"blur(10px)",transition:"all 0.2s",fontFamily:"'Tajawal',system-ui"}}>{ar}</button>
                        ))}
                      </div>
                    </div>
                  </>}

                  {c3.type==="speech" && <>
                    <div style={{color:t.muted,fontSize:12,marginBottom:10,letterSpacing:1}}>اقرأ هذه الجملة بصوت عالٍ</div>
                    <div style={{fontWeight:700,fontSize:18,color:t.primary,marginBottom:20,lineHeight:1.6,background:`${t.primary}11`,padding:"14px",borderRadius:14,border:`1px solid ${t.border}`}}>"{c3.sentence}"</div>
                    {speechResult
                      ? <><div style={{background:"rgba(34,197,94,0.15)",border:"1px solid #22c55e",borderRadius:14,padding:14,color:"#22c55e",fontWeight:700,marginBottom:12}}>{speechResult}</div>
                          <button onClick={()=>{setSpeechResult("");setSrsIdx(i=>(i+1)%SRS_CARDS.length);}} style={btnPrimary({width:"100%"})}>التالي ←</button></>
                      : <button onClick={startSpeech} style={btnPrimary({width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10})}>
                          {speechActive?<><span style={{animation:"pulse 0.5s infinite"}}>⏺</span><span>جاري التحليل...</span></>:<>{Ic.mic("white",20)}<span>اضغط وتحدث</span></>}
                        </button>}
                  </>}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── LEADERBOARD ───────────────────────────────────────── */}
        {tab==="leaderboard" && (
          <div style={{animation:"slideIn 0.4s ease"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
              {[["🥇","ذهبي","#f59e0b"],["🥈","فضي","#94a3b8"],["🥉","برونزي","#cd7f32"]].map(([ic,n,c])=>(
                <div key={n} style={{...glassCard({textAlign:"center",padding:"14px 6px",border:`1px solid ${c}33`})}}>
                  <div style={{fontSize:28}}>{ic}</div>
                  <div style={{fontSize:11,color:c,fontWeight:700,marginTop:4}}>{n}</div>
                </div>
              ))}
            </div>

            <div style={{...glassCard({marginBottom:14,background:`linear-gradient(135deg,${t.primary}18,${t.accent}0a)`})}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontWeight:800,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{Ic.sword(t.primary)}<span>تحدٍّ مباشر</span></div>
                <div style={tag("#f59e0b")}>+50 XP للفائز</div>
              </div>
              {!showChallenge ? (
                <button style={btnPrimary({width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8})} onClick={()=>setShowChallenge(true)}>
                  {Ic.sword("white")}<span>تحدّ صديقاً</span>
                </button>
              ) : !challengeActive ? (
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:40,marginBottom:8}}>🐬</div>
                  <div style={{fontWeight:700,marginBottom:4}}>Alex</div>
                  <div style={{color:t.muted,fontSize:12,marginBottom:14}}>سباق كلمات · 60 ثانية</div>
                  <button style={btnPrimary({width:"100%"})} onClick={()=>{setChallengeActive(true);setChallengeTime(60);setChallengeScore({me:0,opp:0});}}>ابدأ السباق ⚡</button>
                </div>
              ) : (
                <div style={{textAlign:"center"}}>
                  <div style={{display:"flex",justifyContent:"center",gap:24,marginBottom:14}}>
                    {[{av:profile.avatar,sc:challengeScore.me,lbl:"أنت",c:t.primary},{av:"🐬",sc:challengeScore.opp,lbl:partner.name,c:"#ef4444"}].map((p2,i)=>(
                      <div key={i} style={{textAlign:"center"}}>
                        <AvatarDisplay src={p2.av} size={44}/>
                        <div style={{fontWeight:900,fontSize:30,color:p2.c,marginTop:4}}>{p2.sc}</div>
                        <div style={{fontSize:11,color:t.muted}}>{p2.lbl}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontWeight:900,fontSize:24,background:`linear-gradient(135deg,${t.primary},${t.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:10}}>⏱ {challengeTime}ث</div>
                  {challengeTime>0
                    ? <button style={btnPrimary({width:"100%"})} onClick={()=>setChallengeScore(s=>({...s,me:s.me+1}))}>+1 كلمة ✓</button>
                    : <div>
                        <div style={{fontWeight:800,fontSize:18,color:challengeScore.me>challengeScore.opp?"#22c55e":"#ef4444",marginBottom:10}}>
                          {challengeScore.me>challengeScore.opp?"🏆 فزت!":"😅 حاول مجدداً"}
                        </div>
                        <button style={btnPrimary({width:"100%"})} onClick={()=>{setShowChallenge(false);if(challengeScore.me>challengeScore.opp)addXp(50,"فوز");}}>
                          {challengeScore.me>challengeScore.opp?"استلام +50 XP 🎉":"إغلاق"}
                        </button>
                      </div>
                  }
                </div>
              )}
            </div>

            <div style={{fontWeight:800,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
              {Ic.trophy(t.primary,16)}<span>الصدارة الأسبوعية</span>
            </div>
            {LEADERBOARD.map((u,i)=>(
              <div key={u.rank} style={{...glassCard({marginBottom:8,display:"flex",alignItems:"center",gap:12,border:u.isMe?`1px solid ${t.primary}`:undefined,background:u.isMe?`${t.primary}18`:t.card,animation:`slideIn 0.3s ease ${i*0.06}s both`})}}>
                <div style={{width:30,height:30,borderRadius:15,background:`${tierC[u.tier]}22`,border:`1px solid ${tierC[u.tier]}44`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:tierC[u.tier],flexShrink:0}}>
                  {u.rank<=3?["🥇","🥈","🥉"][u.rank-1]:u.rank}
                </div>
                <div style={{fontSize:28,flexShrink:0}}>{u.avatar}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{u.name}{u.isMe?" (أنت)":""}</div>
                  <div style={{color:tierC[u.tier],fontSize:11,fontWeight:700,marginTop:2}}>{u.xp.toLocaleString()} XP</div>
                </div>
                <div style={{fontSize:12,color:u.delta.startsWith("+")?"#22c55e":u.delta==="="?t.muted:"#ef4444",fontWeight:700}}>{u.delta}</div>
              </div>
            ))}

            <div style={{...glassCard({marginTop:14})}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}>❄️<span>تجميد السلسلة</span></div>
                  <div style={{color:t.muted,fontSize:11,marginTop:2}}>احمِ سلسلتك ليوم واحد</div>
                </div>
                <button onClick={()=>{if(coins>=50){setCoins(c=>c-50);setStreakFrozen(true);}}} style={btnPrimary({padding:"10px 18px",fontSize:12,opacity:coins<50?0.5:1,background:streakFrozen?`linear-gradient(135deg,#22c55e,#16a34a)`:undefined})}>
                  {streakFrozen?"✅ مفعّل":`50 🪙`}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:t.card,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:`1px solid ${t.border}`,display:"flex",zIndex:50,boxShadow:`0 -4px 24px rgba(0,0,0,0.1)`}}>
        {TABS.map(({id,label,icon})=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 4px 14px",background:"none",border:"none",color:tab===id?t.primary:t.muted,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"color 0.2s",position:"relative"}}>
            {tab===id && <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:`linear-gradient(90deg,${t.primary},${t.secondary})`,borderRadius:"0 0 2px 2px",boxShadow:`0 0 8px ${t.glow}`}}/>}
            {icon(tab===id?t.primary:t.muted,20)}
            <span style={{fontSize:9,fontWeight:tab===id?700:400,letterSpacing:0.3}}>{label}</span>
          </button>
        ))}
      </div>

      {/* PROFILE MODAL */}
      {showProfile && (()=>{
        const FS = ["Aisha","Sara","Fatima","Layla","Nour","Hana","Rania","Dina","Maya","Lena","Sofia","Emma","Olivia","Ava","Isabella","Mia","Charlotte","Amelia","Harper","Evelyn","Luna","Chloe","Penelope","Grace","Zoe","Natalie","Hannah","Lily","Eleanor","Aria","Scarlett","Victoria","Aurora","Claire","Aaliyah","Savannah","Audrey","Brooklyn","Bella","Skylar","Leah","Zara","Nadia","Yasmin","Mariam","Heba","Rana","Samar","Noura","Reem"];
        const MS = ["Felix","Oscar","Bruno","Marco","Diego","Carlos","Ivan","Maxim","Dmitri","Boris","Hunter","Ranger","Blaze","Storm","Rock","Duke","Ace","King","Titan","Atlas","Zack","Tyler","Blake","Chase","Cole","Derek","Evan","Frank","Glen","Hank","Igor","Jake","Kent","Lance","Mike","Neil","Owen","Pete","Quinn","Reed","Scott","Todd","Uri","Vince","Wade","Xander","York","Zane","Brock","Chad"];
        const fUrl = s=>`https://api.dicebear.com/7.x/lorelei/svg?seed=${s}&backgroundColor=ffd5dc,ffdfbf,ffecd2,f8b4d9,fce4ec`;
        const mUrl = s=>`https://api.dicebear.com/7.x/adventurer/svg?seed=${s}&backgroundColor=b6e3f4,c0aede,bfdbfe,dbeafe,e0f2fe`;
        const isUrl = profile.avatar?.startsWith("http");
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowProfile(false)}>
            <div style={{...glassCard({width:"100%",borderRadius:"24px 24px 0 0",padding:22,maxHeight:"88vh",overflowY:"auto"})}} onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:900,fontSize:18,marginBottom:16,textAlign:"center",background:`linear-gradient(135deg,${t.primary},${t.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>✏️ تعديل الملف الشخصي</div>
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{width:90,height:90,borderRadius:45,overflow:"hidden",margin:"0 auto",border:`3px solid ${t.primary}`,boxShadow:`0 0 0 4px ${t.glow},0 8px 24px rgba(0,0,0,0.2)`}}>
                  {isUrl ? <img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="avatar"/>
                          : <span style={{fontSize:60,lineHeight:"90px",display:"block"}}>{profile.avatar}</span>}
                </div>
                <div style={{fontSize:11,color:t.muted,marginTop:8}}>اضغط على صورة لتغييرها</div>
              </div>

              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {[["avatar","🎨 أفاتار"],["email","📧 بريد إلكتروني"]].map(([mode,label])=>(
                  <button key={mode} onClick={()=>setPhotoMode(mode)} style={{flex:1,padding:"10px",borderRadius:12,border:`1px solid ${photoMode===mode?t.primary:t.border}`,background:photoMode===mode?`${t.primary}22`:"transparent",color:photoMode===mode?t.primary:t.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',system-ui",transition:"all 0.2s"}}>{label}</button>
                ))}
              </div>

              {photoMode==="email" && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:t.muted,marginBottom:6}}>أدخل البريد الإلكتروني لجلب صورة Gravatar</div>
                  <div style={{display:"flex",gap:8}}>
                    <input value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="example@email.com" style={{...inp,flex:1,fontSize:13}}/>
                    <button onClick={()=>{ if(emailInput) setProfile(p=>({...p,avatar:`https://www.gravatar.com/avatar/${btoa(emailInput.trim().toLowerCase())}?d=identicon&s=200`})); }} style={btnPrimary({padding:"10px 16px",fontSize:12,flexShrink:0})}>جلب</button>
                  </div>
                </div>
              )}

              {photoMode==="avatar" && (<>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  {[["female","👩 إناث"],["male","👨 ذكور"]].map(([tb,label])=>(
                    <button key={tb} onClick={()=>setAvatarTab(tb)} style={{flex:1,padding:"9px",borderRadius:12,border:`1px solid ${avatarTab===tb?t.primary:t.border}`,background:avatarTab===tb?`${t.primary}22`:"transparent",color:avatarTab===tb?t.primary:t.muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',system-ui",transition:"all 0.2s"}}>{label}</button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:12}}>
                  {(avatarTab==="female"?FS:MS).map(seed=>{
                    const url = avatarTab==="female"?fUrl(seed):mUrl(seed);
                    const sel = profile.avatar===url;
                    return (
                      <button key={seed} onClick={()=>setProfile(p=>({...p,avatar:url}))} style={{background:sel?`${t.primary}33`:"transparent",border:`2px solid ${sel?t.primary:t.border}`,borderRadius:12,padding:4,cursor:"pointer",overflow:"hidden",transition:"all 0.2s",boxShadow:sel?`0 0 12px ${t.glow}`:undefined}}>
                        <img src={url} style={{width:"100%",aspectRatio:"1",borderRadius:8,display:"block"}} alt={seed} loading="lazy"/>
                      </button>
                    );
                  })}
                </div>
              </>)}

              {[["name","اسم المستخدم"],["bio","نبذة شخصية"],["status","الحالة"]].map(([k,l])=>(
                <div key={k} style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:t.muted,marginBottom:4}}>{l}</div>
                  <input value={profile[k]||""} onChange={e=>setProfile(p=>({...p,[k]:e.target.value}))} style={inp}/>
                </div>
              ))}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:t.muted,marginBottom:4}}>لغتي الأم</div>
                <select value={profile.lang} onChange={e=>setProfile(p=>({...p,lang:e.target.value}))} style={{...inp}}>
                  {["Arabic","English","French","Spanish","German","Chinese","Japanese","Turkish"].map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
              <div style={{...glassCard({marginBottom:14,background:`${t.primary}18`})}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontWeight:700,fontSize:13}}>المستوى {lvl.level}</span>
                  <span style={{color:t.muted,fontSize:11}}>{lvl.current}/{lvl.needed} XP</span>
                </div>
                <XPBar pct={lvl.pct} color={t.primary} accent={t.accent}/>
              </div>
              <button onClick={()=>setShowProfile(false)} style={btnPrimary({width:"100%"})}>حفظ التغييرات ✓</button>
            </div>
          </div>
        );
      })()}

      {/* SETTINGS MODAL */}
      {showSettings && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSettings(false)}>
          <div style={{...glassCard({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:18,marginBottom:18,textAlign:"center",background:`linear-gradient(135deg,${t.primary},${t.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>⚙️ الإعدادات</div>
            <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>🎨 الثيم</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:20}}>
              {Object.entries(THEMES).map(([name,th])=>(
                <button key={name} onClick={()=>{setTheme(name);setDarkMode(th.dark!==false);}} style={{aspectRatio:"1",borderRadius:12,background:`linear-gradient(135deg,${th.primary},${th.secondary})`,border:theme===name?`2px solid ${textCol}`:"2px solid transparent",cursor:"pointer",fontSize:10,color:"white",fontWeight:800,boxShadow:theme===name?`0 0 12px ${th.primary}88`:undefined,transition:"all 0.2s",textShadow:"0 1px 3px rgba(0,0,0,0.4)"}}>
                  {theme===name?"✓":""}
                </button>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,padding:"12px 0",borderBottom:`1px solid ${t.border}`}}>
              <div style={{fontWeight:700,fontSize:13}}>🌙 الوضع الداكن</div>
              <button onClick={()=>setDarkMode(d=>!d)} style={{background:isDark?`linear-gradient(135deg,${t.primary},${t.secondary})`:"rgba(0,0,0,0.1)",border:"none",borderRadius:50,width:52,height:28,position:"relative",cursor:"pointer",transition:"background 0.3s",boxShadow:isDark?`0 2px 10px ${t.glow}`:undefined}}>
                <div style={{width:20,height:20,borderRadius:10,background:"white",position:"absolute",top:4,transition:"left 0.25s",left:isDark?28:4,boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/>
              </button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,padding:"12px 0",borderBottom:`1px solid ${t.border}`}}>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>🔔 الإشعارات</div>
                <div style={{fontSize:11,color:t.muted,marginTop:2}}>إشعارات الرسائل والمكالمات</div>
              </div>
              <button style={{background:`linear-gradient(135deg,${t.primary},${t.secondary})`,border:"none",borderRadius:50,width:52,height:28,position:"relative",cursor:"pointer",boxShadow:`0 2px 10px ${t.glow}`}}>
                <div style={{width:20,height:20,borderRadius:10,background:"white",position:"absolute",top:4,left:28}}/>
              </button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,padding:"12px 0"}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:6}}>{Ic.shield("#22c55e",14)}<span>التشفير الكامل</span></div>
                <div style={{fontSize:11,color:"#22c55e",marginTop:2}}>✅ مفعّل دائماً</div>
              </div>
            </div>
            <button onClick={()=>setShowSettings(false)} style={btnPrimary({width:"100%"})}>حفظ ✓</button>
          </div>
        </div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
        @keyframes dot0{0%,100%{transform:translateY(0)}33%{transform:translateY(-5px)}}
        @keyframes dot1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes dot2{0%,100%{transform:translateY(0)}66%{transform:translateY(-5px)}}
        * { -webkit-tap-highlight-color: transparent; }
        select option { background: #1a1a2e; color: white; }
      `}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Ailo />);
</script>
</body>
</html>
