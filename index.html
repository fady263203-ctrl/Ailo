// ======================== المكونات المساعدة ========================
function XPBar({pct,primary,accent}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),400);return()=>clearTimeout(t);},[pct]);
  const col=pct>75?accent:primary;
  return(<div style={{height:7,background:"rgba(128,128,128,0.2)",borderRadius:50,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:`linear-gradient(90deg,${primary},${col})`,borderRadius:50,transition:"width 1s cubic-bezier(.4,0,.2,1)",boxShadow:w>0?`0 0 10px ${col}88`:undefined}}/></div>);
}

function WeekChart({data,primary}){
  const max=Math.max(...data);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>{["أح","إث","ث","أر","خ","ج","س"].map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:50,display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:`${(data[i]/max)*100}%`,background:i===6?`linear-gradient(180deg,${primary},${primary}88)`:`${primary}44`,borderRadius:"3px 3px 0 0",transition:"height 1s ease",minHeight:3}}/></div><span style={{fontSize:9,opacity:0.5}}>{d}</span></div>))}</div>);
}

const leaveAgora = useCallback(async()=>{
  try{
    const client = agoraRef.current;
    if(client){
      const tracks = [];
      if(localAudioRef.current) tracks.push(localAudioRef.current);
      if(localVideoRef.current) tracks.push(localVideoRef.current);
      if(tracks.length > 0){
        try{ await client.unpublish(tracks); }catch(e){}
      }
    }
    if(localAudioRef.current){
      try{ localAudioRef.current.stop(); }catch(e){}
      try{ await localAudioRef.current.close(); }catch(e){}
      localAudioRef.current = null;
    }
    if(localVideoRef.current){
      try{ localVideoRef.current.stop(); }catch(e){}
      try{ await localVideoRef.current.close(); }catch(e){}
      localVideoRef.current = null;
    }
    if(client){
      try{ await client.leave(); }catch(e){}
      agoraRef.current = null;
    }
  }catch(e){ console.error("leaveAgora:",e); }
},[]);

const joinAgora = useCallback(async(channelName, type)=>{
  if(!window.AgoraRTC) { console.error("AgoraRTC not loaded"); return; }
  try{
    await leaveAgora();

    const safeChannel = channelName.replace(/[^a-zA-Z0-9_]/g,'').slice(0,64) || 'ailo';
    const token = null; 
    window.AgoraRTC.setLogLevel(4);
    const client = window.AgoraRTC.createClient({mode:"rtc",codec:"vp8"});
    agoraRef.current = client;

    client.on("user-published", async(user, mediaType)=>{
      await client.subscribe(user, mediaType);
      if(mediaType==="audio") user.audioTrack?.play();
      if(mediaType==="video" && remoteVideoElRef.current){
        user.videoTrack?.play(remoteVideoElRef.current);
      }
    });

    const uid = await client.join(AGORA_APP_ID, safeChannel, token, null);

    if(type==="voice"||type==="video"){
      try{
        const audio = await window.AgoraRTC.createMicrophoneAudioTrack({
          encoderConfig: "music_standard",
          bypassWebAudio: true 
        });
        localAudioRef.current = audio;
        await client.publish([audio]);
      }catch(e){ console.error("Audio error:",e); }
    }

    if(type==="video"){
      try{
        const video = await window.AgoraRTC.createCameraVideoTrack({
          encoderConfig:"480p_1",
          facingMode:"user"
        });
        localVideoRef.current = video;
        await client.publish([video]);
        if(localVideoElRef.current) video.play(localVideoElRef.current);
      }catch(e){ console.error("Video error:",e); }
    }

  }catch(e){ console.error("Agora join error:",e); }
},[leaveAgora, getAgoraToken]);

if(screen==="matching") return(
  <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,padding:32,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 50%,${glow} 0%,transparent 70%)`,pointerEvents:"none"}}/>
    {!matched?(<>
      <div style={{fontSize:72,animation:"spin 4s linear infinite",filter:`drop-shadow(0 0 20px ${primary})`}}>🔍</div>
      <div style={{fontWeight:800,fontSize:24,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>جاري البحث...</div>
      <div style={{...glass({width:"100%",textAlign:"center"})}}>
        <div style={{color:muted,fontSize:13,marginBottom:10}}>نبحث عن شريك لغوي</div>
        <div style={{fontWeight:700,fontSize:22,color:primary}}>{fmt(searchTime)}</div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:12}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:primary,animationName:"dot"+i,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>
      </div>
      <button style={btnP({background:"linear-gradient(135deg,#ef4444,#dc2626)"})} onClick={cancelSearch}>إلغاء</button>
    </>):(<>
      <div style={{fontSize:72}}>🎉</div>
      <div style={{fontWeight:800,fontSize:24,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>تم العثور على شريك!</div>
      <div style={{...glass({width:"100%",textAlign:"center"})}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
          <div style={{width:80,height:80,borderRadius:40,overflow:"hidden",border:`3px solid ${primary}`,boxShadow:`0 0 0 3px ${glow}`}}>
            {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="" onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="block";}}/>:<span style={{fontSize:56,lineHeight:"80px",display:"block",textAlign:"center"}}>{partner.av||"🌍"}</span>}
          </div>
        </div>
        <div style={{fontWeight:800,fontSize:20}}>{partner.name}</div>
        <div style={{color:muted,fontSize:12,marginTop:4}}>🌍 {partner.country}</div>
      </div>
      <div style={{display:"flex",gap:12,width:"100%"}}>
        <button style={btnP({flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)"})} onClick={cancelSearch}>رفض ✕</button>
        <button style={btnP({flex:1})} onClick={acceptMatch}>قبول ✓</button>
      </div>
    </>)}
    <style>{CSS}</style>
  </div>
);

// ── شاشة Call ──────────────────────────────────────────────────────────────────
if(screen==="call") return(
  <div style={{background:darkMode?"#060612":bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"'Tajawal',system-ui",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 50% 30%,${primary}22 0%,transparent 70%)`,pointerEvents:"none"}}/>
    {callType==="video" && <div ref={remoteVideoElRef} style={{position:"absolute",inset:0,background:"#111",zIndex:0}}/>}
    {callType==="video" && remoteCamOff && (
      <div style={{position:"absolute",inset:0,zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"#111"}}>
        <div style={{textAlign:"center"}}>
          <div style={{width:80,height:80,borderRadius:40,overflow:"hidden",margin:"0 auto 10px",border:`2px solid ${primary}`}}>
            {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:56,lineHeight:"80px",display:"block"}}>{partner.av||"🌍"}</span>}
          </div>
          <div style={{color:"#aaa",fontSize:13}}>أوقف الكاميرا 📷</div>
        </div>
      </div>
    )}
    <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:4}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{background:"rgba(34,197,94,0.15)",borderRadius:50,padding:"4px 12px",display:"flex",alignItems:"center",gap:5}}>{Ic.shield("#22c55e",12)}<span style={{fontSize:11,color:"#22c55e",fontWeight:600}}>مشفر</span></div>
        {remoteMicOff && <div style={{background:"rgba(239,68,68,0.2)",borderRadius:50,padding:"4px 10px",display:"flex",alignItems:"center",gap:4}}>{Ic.micOff("#ef4444",12)}<span style={{fontSize:10,color:"#ef4444"}}>كتم الصوت</span></div>}
        {remoteCamOff && callType==="video" && <div style={{background:"rgba(239,68,68,0.2)",borderRadius:50,padding:"4px 10px",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:10}}>📷</span><span style={{fontSize:10,color:"#ef4444"}}>أوقف الكاميرا</span></div>}
      </div>
      <div style={{color:primary,fontWeight:800,fontSize:18,letterSpacing:2}}>{fmt(callTime)}</div>
    </div>
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
      {callType!=="video" && <div style={{textAlign:"center"}}>
        <div style={{width:100,height:100,borderRadius:50,overflow:"hidden",margin:"0 auto 12px",border:`3px solid ${primary}`,boxShadow:`0 0 30px ${primary}44`}}>
          {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:80,lineHeight:"100px",display:"block"}}>{partner.av||"🌍"}</span>}
        </div>
        <div style={{fontSize:24,fontWeight:800,color:"white"}}>{partner.name}</div>
        <div style={{color:muted,fontSize:13,marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span>🎙️ مكالمة صوتية</span>
          {remoteMicOff && <span style={{color:"#ef4444",fontSize:12}}>• كتم الصوت 🔇</span>}
        </div>
        <div style={{marginTop:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:remoteMicOff?"#ef4444":primary,animationName:`dot${i}`,animationDuration:"1.2s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}
        </div>
      </div>}
    </div>
    {callType==="video" && <div ref={localVideoElRef} style={{position:"absolute",bottom:120,left:16,width:90,height:120,borderRadius:16,border:`2px solid ${camOn?primary:"#ef4444"}`,overflow:"hidden",boxShadow:`0 0 20px ${glow}`,zIndex:4,background:"#111"}}>
      {!camOn && <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#aaa",fontSize:11}}>كاميرا مغلقة</div>}
    </div>}
    <div style={{padding:"20px 30px 44px",display:"flex",justifyContent:"center",gap:18,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(10px)",zIndex:4}}>
      {[
        {icon:micOn?Ic.mic("white",22):Ic.micOff("white",22), label:micOn?"كتم":"تشغيل", active:micOn, action:toggleMic},
        {icon:Ic.endCall("white",24), label:"إنهاء", end:true, action:async()=>{
          if(roomRef.current) roomRef.current.send({type:"broadcast",event:"call_end",payload:{}});
          await leaveAgora();
          const dur=fmt(callTime);
          const entry={id:Date.now(),partner:partner.name,lang:"—",dur,date:new Date().toLocaleDateString("en",{month:"short",day:"numeric"}),type:callType,xp:30};
          setCallHistory(h=>{const nh=[entry,...h.slice(0,19)];save("callhist",nh);return nh;});
          setStats(s=>{const ns={...s,callsTotal:s.callsTotal+1};checkBadges(ns);return ns;});
          updateQuest("calls");
          const today=new Date().toDateString();
          const lastDay=load("last_call_day","");
          if(lastDay!==today){
            const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
            const newStreak=lastDay===yesterday.toDateString()?streak+1:1;
            setStreak(newStreak);save("streak",newStreak);save("last_call_day",today);
          }
          setMicOn(true); setCamOn(true); setRemoteMicOff(false); setRemoteCamOff(false);
          setScreen("home");addXp(30,"مكالمة");setCoins(c=>c+10);
        }},
        ...(callType==="video"?[
          {icon:camOn?Ic.video("white",22):Ic.video("#ef4444",22), label:camOn?"كاميرا":"مغلق", active:camOn, action:toggleCam},
          {icon:Ic.flip("white",18), label:"تبديل", active:true, action:()=>setFrontCam(f=>!f)},
        ]:[]),
      ].map((b,i)=>(
        <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <button onClick={b.action} style={{width:b.end?62:52,height:b.end?62:52,borderRadius:b.end?31:26,background:b.end?"linear-gradient(135deg,#ef4444,#dc2626)":b.active?`${primary}55`:"rgba(239,68,68,0.8)",border:`1px solid ${b.end?"transparent":b.active?primary:"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:b.end?"0 4px 20px rgba(239,68,68,0.5)":undefined}}>{b.icon}</button>
          <span style={{color:"#aaa",fontSize:10}}>{b.label}</span>
        </div>
      ))}
    </div>
    <style>{CSS}</style>
  </div>
);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Ailo));
</script>
</body>
</html>
