function XPBar({pct,primary,accent}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),400);return()=>clearTimeout(t);},[pct]);
  const col=pct>75?accent:primary;
  return(<div style={{height:7,background:"rgba(128,128,128,0.2)",borderRadius:50,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:`linear-gradient(90deg,${primary},${col})`,borderRadius:50,transition:"width 1s cubic-bezier(.4,0,.2,1)",boxShadow:w>0?`0 0 10px ${col}88`:undefined}}/></div>);
}

function WeekChart({data,primary}){
  const max=Math.max(...data);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>{["أح","إث","ث","أر","خ","ج","س"].map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:50,display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:`${(data[i]/max)*100}%`,background:i===6?`linear-gradient(180deg,${primary},${primary}88)`:`${primary}44`,borderRadius:"3px 3px 0 0",transition:"height 1s ease",minHeight:3}}/></div><span style={{fontSize:9,opacity:0.5}}>{d}</span></div>))}</div>);
}

          <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:24,padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            {isReg&&<div style={{marginBottom:14}}><div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>الاسم الكامل</div><input value={authForm.name} onChange={e=>setAuthForm(f=>({...f,name:e.target.value}))} placeholder="اسمك هنا" style={aInp}/></div>}
            <div style={{marginBottom:14}}><div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>البريد الإلكتروني</div><input value={authForm.email} onChange={e=>setAuthForm(f=>({...f,email:e.target.value}))} placeholder="example@email.com" type="email" style={aInp}/></div>
            <div style={{marginBottom:isReg?14:22}}><div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>كلمة المرور</div><input value={authForm.password} onChange={e=>setAuthForm(f=>({...f,password:e.target.value}))} placeholder={isReg?"6 أحرف على الأقل":"••••••••"} type="password" style={aInp} onKeyDown={e=>e.key==="Enter"&&handle()}/></div>
            {isReg&&<div style={{marginBottom:22}}><div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>لغتي الأم</div><select value={authForm.lang} onChange={e=>setAuthForm(f=>({...f,lang:e.target.value}))} style={{...aInp,appearance:"none"}}>{["Arabic","English","French","Spanish","German","Chinese","Japanese","Turkish"].map(l=><option key={l} value={l} style={{background:"#302b63"}}>{l}</option>)}</select></div>}
            {authError&&<div style={{background:authError.startsWith("✅")?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)",border:`1px solid ${authError.startsWith("✅")?"rgba(34,197,94,0.4)":"rgba(239,68,68,0.4)"}`,borderRadius:10,padding:"10px 14px",color:authError.startsWith("✅")?"#86efac":"#fca5a5",fontSize:13,marginBottom:14,textAlign:"center"}}>{authError}</div>}
            <button onClick={handle} disabled={authLoading} style={{width:"100%",padding:15,borderRadius:14,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",fontWeight:800,fontSize:16,cursor:authLoading?"not-allowed":"pointer",fontFamily:"'Tajawal',system-ui",boxShadow:"0 4px 20px rgba(99,102,241,0.5)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,opacity:authLoading?0.7:1}}>
              {authLoading?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span><span>جاري التحقق...</span></>:isReg?"إنشاء الحساب ✓":"تسجيل الدخول →"}
            </button>
            <div style={{textAlign:"center",marginTop:16}}>
              <button onClick={()=>{setAppScreen(isReg?"login":"register");setAuthError("");}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>
                {isReg?"لديك حساب؟ ":"ليس لديك حساب؟ "}<span style={{color:"#818cf8",fontWeight:700}}>{isReg?"تسجيل الدخول":"إنشاء حساب"}</span>
              </button>
            </div>
          </div>
        </div>
        <style>{CSS}</style>
      </div>
    );
  }

  // ── MATCHING ──────────────────────────────────────────────────────────────
  if(screen==="matching") return(
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,padding:32,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:`radial-gradient(circle at 50% 50%,${glow} 0%,transparent 70%)`,pointerEvents:"none"}}/>
      {!matched?(<>
        <div style={{fontSize:72,animation:"spin 4s linear infinite",filter:`drop-shadow(0 0 20px ${primary})`}}>🔍</div>
        <div style={{fontWeight:800,fontSize:24,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>جاري البحث...</div>
        <div style={{...glass({width:"100%",textAlign:"center"})}}>
          <div style={{color:muted,fontSize:13,marginBottom:10}}>نبحث عن شريك لغوي</div>
          <div style={{fontWeight:700,fontSize:22,color:primary}}>{fmt(searchTime)}</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:12}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:primary,animationName:"dot"+i,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>
        </div>
        <button style={btnP({background:"linear-gradient(135deg,#ef4444,#dc2626)"})} onClick={cancelSearch}>إلغاء</button>
      </>):(<>
        <div style={{fontSize:72}}>🎉</div>
        <div style={{fontWeight:800,fontSize:24,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>تم العثور على شريك!</div>
        <div style={{...glass({width:"100%",textAlign:"center"})}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <div style={{width:80,height:80,borderRadius:40,overflow:"hidden",border:`3px solid ${primary}`,boxShadow:`0 0 0 3px ${glow}`}}>
              {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="" onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="block";}}/>:<span style={{fontSize:56,lineHeight:"80px",display:"block",textAlign:"center"}}>{partner.av||"🌍"}</span>}
            </div>
          </div>
          <div style={{fontWeight:800,fontSize:20}}>{partner.name}</div>
          <div style={{color:muted,fontSize:12,marginTop:4}}>🌍 {partner.country}</div>
        </div>
        <div style={{display:"flex",gap:12,width:"100%"}}>
          <button style={btnP({flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)"})} onClick={cancelSearch}>رفض ✕</button>
          <button style={btnP({flex:1})} onClick={acceptMatch}>قبول ✓</button>
        </div>
      </>)}
      <style>{CSS}</style>
    </div>
  );

  // ── CALL ──────────────────────────────────────────────────────────────────
  if(screen==="call") return(
    <div style={{background:darkMode?"#060612":bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"'Tajawal',system-ui",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse at 50% 30%,${primary}22 0%,transparent 70%)`,pointerEvents:"none"}}/>
      {callType==="video" && <div ref={remoteVideoElRef} style={{position:"absolute",inset:0,background:"#111",zIndex:0}}/>}
      {/* Remote cam off overlay */}
      {callType==="video" && remoteCamOff && (
        <div style={{position:"absolute",inset:0,zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"#111"}}>
          <div style={{textAlign:"center"}}>
            <div style={{width:80,height:80,borderRadius:40,overflow:"hidden",margin:"0 auto 10px",border:`2px solid ${primary}`}}>
              {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:56,lineHeight:"80px",display:"block"}}>{partner.av||"🌍"}</span>}
            </div>
            <div style={{color:"#aaa",fontSize:13}}>أوقف الكاميرا 📷</div>
          </div>
        </div>
      )}
      {/* Header with status indicators */}
      <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:4}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{background:"rgba(34,197,94,0.15)",borderRadius:50,padding:"4px 12px",display:"flex",alignItems:"center",gap:5}}>{Ic.shield("#22c55e",12)}<span style={{fontSize:11,color:"#22c55e",fontWeight:600}}>مشفر</span></div>
          {/* Remote status indicators */}
          {remoteMicOff && <div style={{background:"rgba(239,68,68,0.2)",borderRadius:50,padding:"4px 10px",display:"flex",alignItems:"center",gap:4}}>{Ic.micOff("#ef4444",12)}<span style={{fontSize:10,color:"#ef4444"}}>كتم الصوت</span></div>}
          {remoteCamOff && callType==="video" && <div style={{background:"rgba(239,68,68,0.2)",borderRadius:50,padding:"4px 10px",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:10}}>📷</span><span style={{fontSize:10,color:"#ef4444"}}>أوقف الكاميرا</span></div>}
        </div>
        <div style={{color:primary,fontWeight:800,fontSize:18,letterSpacing:2}}>{fmt(callTime)}</div>
      </div>
      {/* Voice call partner display */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>
        {callType!=="video" && <div style={{textAlign:"center"}}>
          <div style={{width:100,height:100,borderRadius:50,overflow:"hidden",margin:"0 auto 12px",border:`3px solid ${primary}`,boxShadow:`0 0 30px ${primary}44`}}>
            {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:80,lineHeight:"100px",display:"block"}}>{partner.av||"🌍"}</span>}
          </div>
          <div style={{fontSize:24,fontWeight:800,color:"white"}}>{partner.name}</div>
          <div style={{color:muted,fontSize:13,marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span>🎙️ مكالمة صوتية</span>
            {remoteMicOff && <span style={{color:"#ef4444",fontSize:12}}>• كتم الصوت 🔇</span>}
          </div>
          <div style={{marginTop:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:remoteMicOff?"#ef4444":primary,animationName:`dot${i}`,animationDuration:"1.2s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}
          </div>
        </div>}
      </div>
      {/* Local video preview */}
      {callType==="video" && <div ref={localVideoElRef} style={{position:"absolute",bottom:120,left:16,width:90,height:120,borderRadius:16,border:`2px solid ${camOn?primary:"#ef4444"}`,overflow:"hidden",boxShadow:`0 0 20px ${glow}`,zIndex:4,background:"#111"}}>
        {!camOn && <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#aaa",fontSize:11}}>كاميرا مغلقة</div>}
      </div>}
      {/* Controls */}
      <div style={{padding:"20px 30px 44px",display:"flex",justifyContent:"center",gap:18,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(10px)",zIndex:4}}>
        {[
          {icon:micOn?Ic.mic("white",22):Ic.micOff("white",22), label:micOn?"كتم":"تشغيل", active:micOn, action:toggleMic},
          {icon:Ic.endCall("white",24), label:"إنهاء", end:true, action:async()=>{
            if(roomRef.current) roomRef.current.send({type:"broadcast",event:"call_end",payload:{}});
            await leaveAgora();
            const dur=fmt(callTime);
            const entry={id:Date.now(),partner:partner.name,lang:"—",dur,date:new Date().toLocaleDateString("en",{month:"short",day:"numeric"}),type:callType,xp:30};
            setCallHistory(h=>{const nh=[entry,...h.slice(0,19)];save("callhist",nh);return nh;});
            setStats(s=>{const ns={...s,callsTotal:s.callsTotal+1};checkBadges(ns);return ns;});
            updateQuest("calls");
            const today=new Date().toDateString();
            const lastDay=load("last_call_day","");
            if(lastDay!==today){
              const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
              const newStreak=lastDay===yesterday.toDateString()?streak+1:1;
              setStreak(newStreak);save("streak",newStreak);save("last_call_day",today);
            }
            setMicOn(true); setCamOn(true); setRemoteMicOff(false); setRemoteCamOff(false);
            setScreen("home");addXp(30,"مكالمة");setCoins(c=>c+10);
          }},
          ...(callType==="video"?[
            {icon:camOn?Ic.video("white",22):Ic.video("#ef4444",22), label:camOn?"كاميرا":"مغلق", active:camOn, action:toggleCam},
            {icon:Ic.flip("white",18), label:"تبديل", active:true, action:()=>setFrontCam(f=>!f)},
          ]:[]),
        ].map((b,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <button onClick={b.action} style={{width:b.end?62:52,height:b.end?62:52,borderRadius:b.end?31:26,background:b.end?"linear-gradient(135deg,#ef4444,#dc2626)":b.active?`${primary}55`:"rgba(239,68,68,0.8)",border:`1px solid ${b.end?"transparent":b.active?primary:"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:b.end?"0 4px 20px rgba(239,68,68,0.5)":undefined}}>{b.icon}</button>
            <span style={{color:"#aaa",fontSize:10}}>{b.label}</span>
          </div>
        ))}
      </div>
      <style>{CSS}</style>
    </div>
  );

  // ── CHAT ──────────────────────────────────────────────────────────────────
  if(screen==="chat"){
    const sendMsg=()=>{
      if(!chatInput.trim())return;
      const t=now();
      const nm={id:Date.now(),from:"me",text:chatInput,time:t,status:"sent"};
      setMessages(p=>[...p,nm]); setChatInput(""); addXp(5,"رسالة");
      // update real stats and quests
      setStats(s=>{ const ns={...s,totalMsgs:s.totalMsgs+1}; checkBadges(ns); return ns; });
      updateQuest("msgs");
      setCoins(c=>c+1);
      if(roomRef.current){
        roomRef.current.send({type:"broadcast",event:"msg",payload:{text:chatInput,time:t}});
        setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"delivered"}:m)),600);
        setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1200);
      }
    };
    return(
      <div style={{background:bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"'Tajawal',system-ui",color:text}}>
        <div style={{background:card,backdropFilter:"blur(20px)",borderBottom:`1px solid ${border}`,display:"flex",alignItems:"center",gap:10,padding:"12px 14px",boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",padding:6}}>{Ic.back(muted)}</button>
          <Av src={partner.av} size={36}/>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{partner.name}</div><div style={{fontSize:11,color:isTyping?"#22c55e":muted,display:"flex",alignItems:"center",gap:4}}>{isTyping?<><span>يكتب الآن</span><span>...</span></>:<><div style={{width:6,height:6,borderRadius:3,background:"#22c55e"}}/><span>متصل</span></>}</div></div>
          <button onClick={()=>setShowBlock(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6}}>{Ic.flag(muted)}</button>
          <button onClick={()=>{setCallType("video");setScreen("call");}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.video(primary,18)}</button>
          <button onClick={()=>{setCallType("voice");setScreen("call");}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.phone(primary,18)}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:9}}>
          <div style={{alignSelf:"center",background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"5px 14px",display:"flex",alignItems:"center",gap:5,fontSize:11,color:muted}}>{Ic.shield("#22c55e",11)}<span>محادثة مشفرة</span></div>
          {messages.map(m=>(
            <div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"76%"}}>
              <div style={{background:m.from==="me"?`linear-gradient(135deg,${primary},${secondary})`:card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":text,padding:m.isImage?"6px":"10px 15px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.6,border:`1px solid ${border}`,boxShadow:m.from==="me"?`0 4px 14px ${glow}`:"0 2px 8px rgba(0,0,0,0.07)",overflow:"hidden"}}>
                {m.isImage&&m.imageData?<img src={m.imageData} style={{maxWidth:220,maxHeight:200,borderRadius:12,display:"block"}} alt=""/>:m.text}
              </div>
              <div style={{fontSize:10,color:muted,marginTop:3,display:"flex",justifyContent:m.from==="me"?"flex-end":"flex-start",alignItems:"center",gap:4}}>{m.time}{m.from==="me"&&(m.status==="read"?Ic.checks("#22c55e",13):m.status==="delivered"?Ic.checks(muted,13):Ic.check(muted,12))}</div>
            </div>
          ))}
          {isTyping&&<div style={{alignSelf:"flex-start",background:card,backdropFilter:"blur(10px)",padding:"12px 16px",borderRadius:"18px 18px 18px 4px",display:"flex",gap:5,border:`1px solid ${border}`}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:3.5,background:primary,animationName:`dot${i}`,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>}
          <div ref={msgEnd}/>
        </div>
        <div style={{padding:"10px 12px",background:card,backdropFilter:"blur(20px)",borderTop:`1px solid ${border}`}}>
          <input ref={fileRef} type="file" accept="image/*,application/pdf,.doc,.docx" style={{display:"none"}} onChange={e=>{
            const f=e.target.files?.[0]; if(!f)return;
            const isImg=f.type.startsWith("image/");
            if(isImg){
              const reader=new FileReader();
              reader.onload=(ev)=>{
                // Compress image before sending (max 400px, quality 0.6)
                const img=new Image();
                img.onload=()=>{
                  const canvas=document.createElement("canvas");
                  const max=400; const ratio=Math.min(max/img.width,max/img.height,1);
                  canvas.width=img.width*ratio; canvas.height=img.height*ratio;
                  canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
                  const imageData=canvas.toDataURL("image/jpeg",0.6);
                  const nm={id:Date.now(),from:"me",text:`📷 صورة`,time:now(),status:"sent",isImage:true,imageData};
                  setMessages(p=>[...p,nm]); addXp(3,"صورة"); setCoins(c=>c+1);
                  if(roomRef.current) roomRef.current.send({type:"broadcast",event:"msg",payload:{text:`📷 صورة`,time:now(),isImage:true,imageData}});
                  setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1000);
                };
                img.src=ev.target.result;
              };
              reader.readAsDataURL(f);
            } else {
              const nm={id:Date.now(),from:"me",text:`📎 ${f.name}`,time:now(),status:"sent"};
              setMessages(p=>[...p,nm]); addXp(3,"مرفق");
              if(roomRef.current) roomRef.current.send({type:"broadcast",event:"msg",payload:{text:`📎 ${f.name}`,time:now()}});
              setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1000);
            }
            e.target.value="";
          }}/>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{if(fileRef.current){fileRef.current.accept="application/pdf,.doc,.docx,.txt";fileRef.current.click();}}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.7,display:"flex"}}>{Ic.attach(muted)}</button>
            <button onClick={()=>{if(fileRef.current){fileRef.current.accept="image/*";fileRef.current.click();}}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.7,display:"flex"}}>{Ic.image(muted)}</button>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="اكتب رسالة..." style={{...inp,flex:1,padding:"10px 14px",borderRadius:50}}/>
            <button onClick={sendMsg} style={{width:42,height:42,borderRadius:21,background:`linear-gradient(135deg,${primary},${secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px ${glow}`}}>{Ic.send("white")}</button>
          </div>
        </div>
        {showBlock&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowBlock(false)}>
            <div style={{...glass({width:"100%",borderRadius:"22px 22px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:800,fontSize:16,marginBottom:14}}>إجراءات الخصوصية</div>
              {[{icon:Ic.block("#ef4444"),label:`حظر ${partner.name}`,c:"#ef4444",action:()=>{setBlocked(b=>[...b,partner.name]);setShowBlock(false);setScreen("home");}},{icon:Ic.flag("#f59e0b"),label:"إبلاغ عن سلوك مسيء",c:"#f59e0b",action:()=>setShowBlock(false)}].map((b,i)=>(
                <button key={i} onClick={b.action} style={{width:"100%",background:`${b.c}11`,border:`1px solid ${b.c}44`,borderRadius:14,padding:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer",color:b.c,fontWeight:700,marginBottom:10,fontFamily:"'Tajawal',system-ui"}}>{b.icon}<span>{b.label}</span></button>
              ))}
            </div>
          </div>
        )}
        <style>{CSS}</style>
      </div>
    );
  }

  // ── MAIN ──────────────────────────────────────────────────────────────────
  const TABS=[
    {id:"home",     label:"الرئيسية", icon:Ic.home},
    {id:"messages", label:"الرسائل",  icon:Ic.chat},
    {id:"exercises",label:"تدريبات",  icon:Ic.star},
    {id:"leaderboard",label:"الصدارة",icon:Ic.trophy},
    {id:"history",  label:"السجل",    icon:Ic.clock},
  ];

  return(
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",paddingBottom:72,position:"relative",overflow:"hidden"}}>

      {/* HEADER */}
      <div style={{background:card,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:`1px solid ${border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>

          <div style={{background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",borderRadius:50,padding:"2px 10px",fontSize:11,fontWeight:800,flexShrink:0,boxShadow:`0 2px 10px ${glow}`}}>Lv.{lvl.level}</div>
          <div style={{flex:1}}><XPBar pct={lvl.pct} primary={primary} accent={accent}/></div>
          <span style={{fontSize:10,color:muted,flexShrink:0}}>{lvl.current}/{lvl.needed}</span>
          <button onClick={()=>setShowCoinsInfo(true)} style={{background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:50,padding:"2px 8px",display:"flex",alignItems:"center",gap:3,flexShrink:0,cursor:"pointer"}}><span style={{fontSize:12}}>🪙</span><span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{coins}</span></button>

      {/* NOTIF */}

      <div style={{padding:14,position:"relative",zIndex:1}}>

        {/* HOME */}
        {tab==="home"&&<div style={{animation:"slideIn 0.4s ease"}}>
          <div style={{...glass({marginBottom:14,padding:20,background:`linear-gradient(135deg,${primary}22,${accent}11)`})}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Av src={profile.avatar} size={56}/>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{profile.name}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{profile.status}</div><div style={{display:"flex",gap:6,marginTop:6}}><div style={tag(primary)}>{profile.lang}</div><div style={tag("#22c55e")}>Lv.{lvl.level}</div></div></div>
            </div>
          </div>
          <div style={{...glass({marginBottom:14})}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:800,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{Ic.zap(primary,15)}<span>المهام اليومية</span></div><div style={tag("#f59e0b")}>🎁 مكافآت</div></div>
            {quests.map((q,qi)=>(<div key={q.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}><span style={{fontSize:19}}>{q.icon}</span><div style={{flex:1}}><div style={{fontSize:13,color:q.claimed?"#22c55e":q.done?text:text,textDecoration:q.claimed?"line-through":"none"}}>{q.text}</div><div style={{height:4,background:"rgba(128,128,128,0.2)",borderRadius:2,marginTop:4}}><div style={{width:`${(q.progress/q.total)*100}%`,height:"100%",background:q.claimed||q.done?`linear-gradient(90deg,#22c55e,#4ade80)`:`linear-gradient(90deg,${primary},${secondary})`,borderRadius:2,transition:"width 0.8s"}}/></div></div>
              {q.claimed?<div style={tag("#22c55e")}>✅ تم</div>:q.done?<button onClick={()=>{ setQuests(qs=>{ const nqs=qs.map((x,i)=>i===qi?{...x,claimed:true}:x); saveQuests(nqs); return nqs; }); addXp(q.xp,"مهمة"); setCoins(c=>c+10); }} style={{...tag("#f59e0b"),cursor:"pointer",border:"none",fontFamily:"'Tajawal',system-ui"}}>استلام +{q.xp}XP</button>:<div style={tag("#f59e0b")}>+{q.xp}XP</div>}
            </div>))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:13,color:muted}}>ابدأ محادثة</div>
            <button onClick={()=>{setSearchId("");setSearchResult(null);setSearchError("");setShowUserSearch(true);}} style={{background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"5px 12px",fontSize:11,cursor:"pointer",color:primary,fontFamily:"'Tajawal',system-ui",fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
              🔍 ابحث عن صديق
            </button>
          </div>
          {[{type:"video",icon:"📹",title:"مكالمة فيديو",desc:"تحدث وجهاً لوجه",grad:`linear-gradient(135deg,${primary}33,${secondary}22)`},{type:"voice",icon:"📞",title:"مكالمة صوتية",desc:"حسّن نطقك",grad:`linear-gradient(135deg,#22c55e33,#4ade8022)`},{type:"text",icon:"💬",title:"دردشة نصية",desc:"تبادل الرسائل",grad:`linear-gradient(135deg,#f59e0b33,#fbbf2422)`}].map(c2=>(
            <button key={c2.type} onClick={()=>startSearch(c2.type)} style={{width:"100%",background:c2.grad,backdropFilter:"blur(10px)",border:`1px solid ${border}`,borderRadius:18,padding:14,display:"flex",alignItems:"center",gap:14,cursor:"pointer",marginBottom:10,textAlign:"right"}}>
              <div style={{width:48,height:48,borderRadius:14,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{c2.icon}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:text}}>{c2.title}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{c2.desc}</div></div>
            </button>
          ))}
          <div style={{...glass({marginTop:6})}}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:12,color:muted}}>إحصائياتك الأسبوعية</div>
            <WeekChart data={[0,1,2,3,4,5,6].map(i=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=d.toLocaleDateString("en",{month:"short",day:"numeric"});return Math.max(callHistory.filter(h=>h.date===ds).length*20,5);})} primary={primary}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>{[["12","محادثة"],["3.5h","تحدثت"],["48","تمرين"]].map(([n,l])=>(<div key={l} style={{textAlign:"center",background:`${primary}18`,border:`1px solid ${border}`,borderRadius:12,padding:"11px 6px"}}><div style={{fontWeight:900,fontSize:20,color:primary}}>{n}</div><div style={{color:muted,fontSize:10,marginTop:2}}>{l}</div></div>))}</div>
          </div>
          <div style={{...glass({marginTop:12})}}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:12,color:muted}}>🏅 شاراتي</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{BADGE_DEFS.map((b,i)=>{
              const earned=load("badges_earned",[]).includes(b.key)||b.cond({...stats,streak});
              return(<div key={i} style={{textAlign:"center",padding:"11px 6px",background:earned?`${primary}18`:"rgba(128,128,128,0.08)",borderRadius:14,border:`1px solid ${earned?primary:border}`,opacity:earned?1:0.4,boxShadow:earned?`0 0 14px ${glow}`:undefined}}>
                <div style={{fontSize:24}}>{b.icon}</div>
                <div style={{fontSize:10,fontWeight:700,marginTop:4,color:earned?primary:muted}}>{b.name}</div>
              </div>);
            })}</div>
          </div>
        </div>}

        {/* MESSAGES TAB - combines friend chat + bot */}
        {tab==="messages"&&<div style={{animation:"slideIn 0.4s ease"}}>

            <button onClick={()=>setActiveChat("friend")} style={{flex:1,padding:"10px",borderRadius:12,border:`1px solid ${activeChat==="friend"?primary:border}`,background:activeChat==="friend"?`${primary}22`:"transparent",color:activeChat==="friend"?primary:muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',system-ui",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              💬 محادثة أصدقاء

            </button>
          </div>

          {/* BOT CHAT */}
          {activeChat==="bot"&&<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 280px)"}}>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
              {botMsgs.map(m=>(<div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"82%"}}>
                {m.from==="bot"&&<div style={{fontSize:13,marginBottom:3,color:muted,display:"flex",alignItems:"center",gap:4}}>✨ <span>Ailo AI</span></div>}
                <div style={{background:m.from==="me"?`linear-gradient(135deg,${primary},${secondary})`:card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":text,padding:"10px 15px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.7,border:`1px solid ${border}`}}>{m.text}</div>
              </div>))}
              <div ref={botEnd}/>
            </div>
            <div style={{display:"flex",gap:8,paddingTop:8}}>
              <input value={botInput} onChange={e=>setBotInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&botInput.trim()){setBotMsgs(p=>[...p,{id:Date.now(),from:"me",text:botInput,time:now()}]);setBotInput("");setTimeout(()=>setBotMsgs(p=>[...p,{id:Date.now()+1,from:"bot",text:BOTS[Math.floor(Math.random()*BOTS.length)],time:now()}]),1000);}}} placeholder="اسأل المساعد..." style={{...inp,flex:1}}/>
              <button onClick={()=>{if(!botInput.trim())return;setBotMsgs(p=>[...p,{id:Date.now(),from:"me",text:botInput,time:now()}]);setBotInput("");setTimeout(()=>setBotMsgs(p=>[...p,{id:Date.now()+1,from:"bot",text:BOTS[Math.floor(Math.random()*BOTS.length)],time:now()}]),1000);}} style={{width:44,height:44,borderRadius:22,background:`linear-gradient(135deg,${primary},${secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px ${glow}`}}>{Ic.send("white")}</button>
            </div>
          </div>}

          {/* FRIEND CHAT */}
          {activeChat==="friend"&&<div>
            {messages.length===0
              ?<div style={{...glass({textAlign:"center",padding:32})}}>
                <div style={{fontSize:40,marginBottom:12}}>💬</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>لا توجد محادثات بعد</div>
                <div style={{color:muted,fontSize:13,marginBottom:16}}>ابدأ محادثة مع شريك لغوي أو ابحث عن صديق</div>
                <button onClick={()=>{setSearchId("");setSearchResult(null);setSearchError("");setShowUserSearch(true);}} style={btnP({fontSize:13})}>🔍 ابحث عن صديق</button>
              </div>
              :<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 290px)"}}>
                <div style={{...glass({marginBottom:10,display:"flex",alignItems:"center",gap:10,padding:"10px 14px"})}}>
                  <div style={{width:36,height:36,borderRadius:18,overflow:"hidden",border:`2px solid ${primary}`}}>
                    {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:22,lineHeight:"36px",display:"block",textAlign:"center"}}>{partner.av||"🌍"}</span>}
                  </div>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{partner.name}</div><div style={{fontSize:11,color:muted}}>{partner.country}</div></div>

                <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:9,paddingBottom:8}}>
                  {messages.map(m=>(
                    <div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"76%"}}>
                      <div style={{background:m.from==="me"?`linear-gradient(135deg,${primary},${secondary})`:card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":text,padding:m.isImage?"6px":"10px 15px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.6,border:`1px solid ${border}`,overflow:"hidden"}}>
                        {m.isImage&&m.imageData?<img src={m.imageData} style={{maxWidth:200,borderRadius:10,display:"block"}} alt=""/>:m.text}
                      </div>
                    </div>
                  ))}
                  <div ref={msgEnd}/>
                </div>
              </div>}
          </div>}
        </div>}

        {/* HISTORY */}
        {tab==="history"&&<div style={{animation:"slideIn 0.4s ease"}}>
          <div style={{fontWeight:800,fontSize:15,marginBottom:12,color:muted}}>سجل المحادثات</div>
          {callHistory.length===0&&<div style={{...glass({textAlign:"center",padding:32,color:muted})}}>لا توجد محادثات بعد 💬</div>}
          {callHistory.map((h,i)=>(<div key={h.id||i} style={{...glass({marginBottom:10,display:"flex",alignItems:"center",gap:12,animation:`slideIn 0.3s ease ${i*0.07}s both`})}}>
            <div style={{width:44,height:44,borderRadius:13,background:`${primary}22`,border:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{h.type==="video"?"📹":h.type==="voice"?"📞":"💬"}</div>

          </div>))}
        </div>}

        {/* EXERCISES */}
        {tab==="exercises"&&<div style={{animation:"slideIn 0.4s ease"}}>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button onClick={()=>setStoreTab(false)} style={{flex:1,padding:"9px",borderRadius:11,border:`1px solid ${!storeTab?primary:border}`,background:!storeTab?`${primary}22`:"transparent",color:!storeTab?primary:muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>📚 تدريبات</button>
            <button onClick={()=>setStoreTab(true)}  style={{flex:1,padding:"9px",borderRadius:11,border:`1px solid ${storeTab?primary:border}`,background:storeTab?`${primary}22`:"transparent",color:storeTab?primary:muted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>🛍️ المتجر</button>
          </div>

          {storeTab&&<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:14,color:muted}}>🛍️ المتجر</div>
              <button onClick={()=>setShowCoinsInfo(true)} style={{background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:50,padding:"4px 12px",fontSize:11,cursor:"pointer",color:"#f59e0b",fontFamily:"'Tajawal',system-ui",display:"flex",alignItems:"center",gap:4,fontWeight:700}}>
                🪙 {coins} — كيف أربح؟
              </button>
            </div>
            {[
              {icon:"❄️",name:"تجميد السلسلة",desc:"احمِ سلسلتك ليوم واحد",price:50,action:()=>{setStreakFrozen(true);save("streakFrozen",true);}},
              {icon:"💎",name:"XP مضاعف",desc:"ضاعف XP لمدة ساعة",price:100,action:()=>{const until=Date.now()+3600000;try{localStorage.setItem("ailo_xp_double_until",until);}catch(e){}setXpDouble(true);setTimeout(()=>setXpDouble(false),3600000);}},
              {icon:"🎨",name:"إطار ذهبي",desc:"إطار مميز للملف الشخصي",price:200,action:()=>save("golden_frame",true)},
              {icon:"🏆",name:"شارة VIP",desc:"شارة حصرية على ملفك",price:500,action:()=>{const e=load("badges_earned",[]);if(!e.includes("vip"))save("badges_earned",[...e,"vip"]);}},
            ].map(item=>(
              <div key={item.id} style={{...glass({marginBottom:10,display:"flex",alignItems:"center",gap:12})}}>
                <div style={{fontSize:32,flexShrink:0}}>{item.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{item.name}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{item.desc}</div></div>
                <button onClick={()=>{ if(coins>=item.price){setCoins(c=>c-item.price);item.action();addXp(5,"شراء"); } }} disabled={coins<item.price} style={{background:coins>=item.price?`linear-gradient(135deg,${primary},${secondary})`:"rgba(128,128,128,0.2)",border:"none",borderRadius:50,padding:"7px 14px",color:"white",fontSize:12,fontWeight:700,cursor:coins>=item.price?"pointer":"not-allowed",fontFamily:"'Tajawal',system-ui",flexShrink:0}}>{item.price} 🪙</button>
              </div>
            ))}
          </div>}

          {!storeTab&&<>
            {!load("tutorial_done",false)&&<div style={{...glass({marginBottom:14,background:`linear-gradient(135deg,${primary}22,${accent}11)`,textAlign:"center",padding:18})}}>
              <div style={{fontSize:28,marginBottom:8}}>📚</div>
              <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>مرحباً في التدريبات!</div>
              <div style={{color:muted,fontSize:12,lineHeight:1.7}}>كل يوم ستجد بطاقات تعليمية جديدة — أجب بدقة لكسب XP وتحسين مستواك. كلما أجبت صحيحاً زاد نقاطك!</div>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:6}}>{Ic.star(primary,16)}<span>تمارين SRS</span></div>
              <div style={{display:"flex",gap:6}}><div style={tag("#22c55e")}>🏆 {srsScore}</div>{srsStreak>1&&<div style={tag("#f59e0b")}>🔥 {srsStreak}</div>}</div>
            </div>
          <div style={{...glass({marginBottom:12})}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:muted,marginBottom:7}}><span>البطاقة {srsIdx+1}/{SRS.length}</span><span>{Math.round((srsIdx/SRS.length)*100)}%</span></div>
            <XPBar pct={Math.round((srsIdx/SRS.length)*100)} primary={primary} accent={accent}/>
          </div>

              {["English","Arabic","French","Spanish","German","Chinese","Japanese","Turkish"].map(lang=>(
                <button key={lang} onClick={()=>{ setTargetLang(lang); doSearch(pendingCallType,lang); }}
                  style={{padding:"14px 10px",borderRadius:14,border:`2px solid ${targetLang===lang?primary:border}`,background:targetLang===lang?`${primary}22`:card,color:targetLang===lang?primary:text,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui",backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s"}}>
                  {{"English":"🇬🇧","Arabic":"🇸🇦","French":"🇫🇷","Spanish":"🇪🇸","German":"🇩🇪","Chinese":"🇨🇳","Japanese":"🇯🇵","Turkish":"🇹🇷"}[lang]} {lang}
                </button>
              ))}
            </div>
            <button onClick={()=>setShowLangPicker(false)} style={{width:"100%",padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui",marginTop:6}}>إلغاء</button>
          </div>
        </div>
      )}

      {/* ── MODAL 2: SEARCH BY ID ─────────────────────────────── */}
      {showUserSearch&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowUserSearch(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:17,marginBottom:6,color:primary}}>🔍 ابحث عن صديق</div>
            <div style={{color:muted,fontSize:12,marginBottom:16}}>أدخل <strong style={{color:primary}}>ID المستخدم</strong> للدردشة المباشرة، أو <strong style={{color:primary}}>الاسم</strong> للبحث</div>
            <div style={{background:`${primary}11`,border:`1px solid ${primary}33`,borderRadius:14,padding:"10px 14px",marginBottom:14,fontSize:12,color:muted}}>
              💡 ID خاصك: <span style={{color:primary,fontWeight:700,fontSize:11,wordBreak:"break-all",userSelect:"all"}}>{userId||"—"}</span>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={searchId} onChange={e=>setSearchId(e.target.value)} placeholder="ID أو اسم المستخدم..." style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&searchUserById()}/>
              <button onClick={searchUserById} style={btnP({padding:"12px 18px",fontSize:13,flexShrink:0})}>{searchLoading?"...":"بحث"}</button>
            </div>
            {searchError&&<div style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:10,padding:"10px 14px",color:"#fca5a5",fontSize:13,marginBottom:14,textAlign:"center"}}>⚠️ {searchError}</div>}
            {searchResult&&Array.isArray(searchResult)&&searchResult.map((u,i)=>(
              <div key={i} style={{...glass({display:"flex",alignItems:"center",gap:12,marginBottom:8})}}>
                <div style={{width:44,height:44,borderRadius:22,overflow:"hidden",flexShrink:0,border:`2px solid ${primary}`}}>
                  {u.avatar?.startsWith("http")?<img src={u.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="" onError={e=>e.target.style.display="none"}/>:<span style={{fontSize:28,lineHeight:"44px",display:"block",textAlign:"center"}}>{u.avatar||"🌍"}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:15}}>{u.name}</div>
                  <div style={{color:muted,fontSize:12,marginTop:2}}>{(u.xp||0).toLocaleString()} XP</div>
                </div>
                <button onClick={()=>{
                  setSearchResult(null); setShowUserSearch(false);
                  setPartner({av:u.avatar||"🌍",name:u.name||"مستخدم",country:"—"});
                  const rid="direct_"+[userId,u.user_id].sort().join("__").replace(/[^a-zA-Z0-9_]/g,"").slice(0,64);
                  setRoomId(rid); setCallType("text");
                  joinRoom(rid); setScreen("chat");
                }} style={btnP({padding:"9px 14px",fontSize:12})}>دردشة 💬</button>
              </div>
            ))}
            <button onClick={()=>setShowUserSearch(false)} style={{width:"100%",padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إغلاق</button>
          </div>
        </div>
      )}

      {/* ── MODAL 3: PROFILE VIEW ────────────────────────────── */}
      {showProfileView&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowProfileView(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:24})}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{width:90,height:90,borderRadius:45,overflow:"hidden",margin:"0 auto 12px",border:`3px solid ${primary}`,boxShadow:`0 0 0 4px ${glow}`}}>
                {profile.avatar?.startsWith("http")?<img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:60,lineHeight:"90px",display:"block"}}>{profile.avatar}</span>}
              </div>
              <div style={{fontWeight:900,fontSize:20}}>{profile.name}</div>
              <div style={{color:muted,fontSize:13,marginTop:4}}>{profile.status}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                <div style={tag(primary)}>{profile.lang}</div>
                <div style={tag("#22c55e")}>Lv.{lvl.level}</div>
                <div style={tag("#f59e0b")}>{totalXp.toLocaleString()} XP</div>
              </div>
            </div>
            {profile.bio&&<div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:14,padding:"12px 16px",color:muted,fontSize:13,textAlign:"center",marginBottom:16}}>"{profile.bio}"</div>}
            <div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:11,color:muted,textAlign:"center"}}>
              🆔 ID: <span style={{color:primary,fontWeight:700,userSelect:"all",fontSize:10}}>{userId||"—"}</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowProfileView(false);setShowProfile(true);}} style={btnP({flex:1,fontSize:13})}>✏️ تعديل</button>
              <button onClick={()=>setShowProfileView(false)} style={{flex:1,padding:"13px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إغلاق</button>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL 4: TUTORIAL ────────────────────────────────── */}
      {showTutorial&&(()=>{
        const steps=[
          {icon:"🌍",title:"مرحباً في Ailo!",desc:"تعلّم لغات جديدة من خلال المحادثة مع أشخاص حقيقيين حول العالم."},
          {icon:"🔍",title:"كيف تبدأ محادثة؟",desc:"اضغط على أحد أزرار (فيديو / صوت / نص) في الصفحة الرئيسية، ثم اختر اللغة التي تريد تعلمها."},
          {icon:"📚",title:"التدريبات اليومية",desc:"اذهب لقسم 'تدريبات' لممارسة المفردات والجمل يومياً. كل إجابة صحيحة تكسبك XP!"},
          {icon:"🪙",title:"كيف تربح العملات؟",desc:"تكسب عملات من: إكمال مهام يومية، إجراء مكالمات، تمارين SRS. استخدمها في المتجر!"},
          {icon:"🏆",title:"الصدارة",desc:"انشر نتيجتك في الصدارة وتنافس مع مستخدمين حول العالم. اضغط 'نشر نتيجتي' في قسم الصدارة."},
        ];
        const s=steps[tutorialStep];
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{...glass({width:"100%",maxWidth:380,textAlign:"center",padding:32,borderRadius:24})}}>
              <div style={{fontSize:64,marginBottom:16}}>{s.icon}</div>
              <div style={{fontWeight:900,fontSize:20,color:primary,marginBottom:12}}>{s.title}</div>
              <div style={{color:muted,fontSize:14,lineHeight:1.8,marginBottom:24}}>{s.desc}</div>
              <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:20}}>
                {steps.map((_,i)=><div key={i} style={{width:i===tutorialStep?20:8,height:8,borderRadius:4,background:i===tutorialStep?primary:`${primary}44`,transition:"all 0.3s"}}/>)}
              </div>
              <div style={{display:"flex",gap:10}}>
                {tutorialStep>0&&<button onClick={()=>setTutorialStep(t=>t-1)} style={{flex:1,padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>السابق</button>}
                <button onClick={()=>{
                  if(tutorialStep<steps.length-1){ setTutorialStep(t=>t+1); }
                  else{ setShowTutorial(false); save("tutorial_done",true); }
                }} style={btnP({flex:1})}>
                  {tutorialStep<steps.length-1?"التالي ←":"ابدأ الآن 🚀"}
                </button>
              </div>
              <button onClick={()=>{setShowTutorial(false);save("tutorial_done",true);}} style={{background:"none",border:"none",color:muted,fontSize:12,cursor:"pointer",marginTop:12,fontFamily:"'Tajawal',system-ui"}}>تخطي</button>
            </div>
          </div>
        );
      })()}

      {/* ── MODAL 5: COINS INFO ───────────────────────────────── */}
      {showCoinsInfo&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowCoinsInfo(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:17,marginBottom:4,color:"#f59e0b"}}>🪙 رصيدك: {coins} عملة</div>
            <div style={{color:muted,fontSize:12,marginBottom:18}}>كيف تربح العملات؟</div>
            {[
              {icon:"💬",desc:"أرسل رسالة في محادثة",coins:"+1"},
              {icon:"📞",desc:"أكمل مكالمة",coins:"+10"},
              {icon:"📚",desc:"أكمل تمرين SRS",coins:"+3"},
              {icon:"✅",desc:"استلام مهمة يومية",coins:"+10"},
              {icon:"🏆",desc:"الفوز في التحدي",coins:"+20"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<4?`1px solid ${border}`:"none"}}>
                <span style={{fontSize:22,flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1,fontSize:13}}>{r.desc}</div>
                <div style={{...tag("#f59e0b"),flexShrink:0}}>{r.coins} 🪙</div>
              </div>
            ))}
            <div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:14,padding:"12px 16px",marginTop:14,fontSize:12,color:muted,textAlign:"center"}}>
              💡 استخدم العملات في <strong style={{color:primary}}>المتجر</strong> للحصول على مزايا حصرية
            </div>
            <button onClick={()=>setShowCoinsInfo(false)} style={btnP({width:"100%",marginTop:14})}>حسناً ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Ailo));
</script>
</body>
</html>
