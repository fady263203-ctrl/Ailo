function XPBar({pct,primary,accent}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),400);return()=>clearTimeout(t);},[pct]);
  const col=pct>75?accent:primary;
  return(<div style={{height:7,background:"rgba(128,128,128,0.2)",borderRadius:50,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:`linear-gradient(90deg,${primary},${col})`,borderRadius:50,transition:"width 1s cubic-bezier(.4,0,.2,1)",boxShadow:w>0?`0 0 10px ${col}88`:undefined}}/></div>);
}

function WeekChart({data,primary}){
  const max=Math.max(...data);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>{["أح","إث","ث","أر","خ","ج","س"].map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:50,display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:`${(data[i]/max)*100}%`,background:i===6?`linear-gradient(180deg,${primary},${primary}88)`:`${primary}44`,borderRadius:"3px 3px 0 0",transition:"height 1s ease",minHeight:3}}/></div><span style={{fontSize:9,opacity:0.5}}>{d}</span></div>))}</div>);
}

        }
      });

          user.audioTrack?.stop();
        }
        if(mediaType==="video"){
          user.videoTrack?.stop();
          if(remoteVideoElRef.current) remoteVideoElRef.current.innerHTML="";
        }
      });

      client.on("user-left", (user)=>{
        user.audioTrack?.stop();
        user.videoTrack?.stop();
        if(remoteVideoElRef.current) remoteVideoElRef.current.innerHTML="";
      });

      const uid = await client.join(AGORA_APP_ID, safeChannel, token, null);
      console.log("Agora joined, uid:", uid);

          const audio = await window.AgoraRTC.createMicrophoneAudioTrack({
            encoderConfig: "music_standard",
            AEC: true,   // Acoustic Echo Cancellation - prevents audio feedback/leak
            AGC: true,   // Auto Gain Control
            ANS: true    // Automatic Noise Suppression
          });
          localAudioRef.current = audio;
          await client.publish([audio]);
          console.log("Audio published");
        }catch(e){ console.error("Audio error:",e); }
      }

      if(type==="video"){
        try{
          const video = await window.AgoraRTC.createCameraVideoTrack({
            encoderConfig:"480p_1",
            facingMode:"user"
          });
          localVideoRef.current = video;

          console.log("Video published");

            {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:remoteMicOff?"#ef4444":primary,animationName:`dot${i}`,animationDuration:"1.2s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}
          </div>
        </div>}
      </div>
      {/* Local video preview */}
      {callType==="video" && <div ref={localVideoElRef} style={{position:"absolute",bottom:120,left:16,width:90,height:120,borderRadius:16,border:`2px solid ${camOn?primary:"#ef4444"}`,overflow:"hidden",boxShadow:`0 0 20px ${glow}`,zIndex:4,background:"#111"}}>
        {!camOn && <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#aaa",fontSize:11}}>كاميرا مغلقة</div>}
      </div>}
      {/* Controls */}
      <div style={{padding:"20px 30px 44px",display:"flex",justifyContent:"center",gap:18,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(10px)",zIndex:4}}>
        {[
          {icon:micOn?Ic.mic("white",22):Ic.micOff("white",22), label:micOn?"كتم":"تشغيل", active:micOn, action:toggleMic},
          {icon:Ic.endCall("white",24), label:"إنهاء", end:true, action:async()=>{
            if(roomRef.current) roomRef.current.send({type:"broadcast",event:"call_end",payload:{}});
            await leaveAgora();
            // Cleanup room channel
            const supa2=getSupa();
            if(roomRef.current&&supa2){ try{supa2.removeChannel(roomRef.current);}catch(e){} roomRef.current=null; }
            const dur=fmt(callTime);
            const entry={id:Date.now(),partner:partner.name,lang:"—",dur,date:new Date().toLocaleDateString("en",{month:"short",day:"numeric"}),type:callType,xp:30};
            setCallHistory(h=>{const nh=[entry,...h.slice(0,19)];save("callhist",nh);return nh;});
            setStats(s=>{const ns={...s,callsTotal:s.callsTotal+1};checkBadges(ns);return ns;});
            updateQuest("calls");
            const today=new Date().toDateString();
            const lastDay=load("last_call_day","");
            if(lastDay!==today){
              const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
              const newStreak=lastDay===yesterday.toDateString()?streak+1:1;
              setStreak(newStreak);save("streak",newStreak);save("last_call_day",today);
            }
            setMicOn(true); setCamOn(true); setRemoteMicOff(false); setRemoteCamOff(false);
            setScreen("home");addXp(30,"مكالمة");setCoins(c=>c+10);
          }},
          ...(callType==="video"?[
            {icon:camOn?Ic.video("white",22):Ic.video("#ef4444",22), label:camOn?"كاميرا":"مغلق", active:camOn, action:toggleCam},
            {icon:Ic.flip("white",18), label:"تبديل", active:true, action:async()=>{
              if(!localVideoRef.current || !agoraRef.current) return;
              const newFront = !frontCam;
              setFrontCam(newFront);
              try{
                const client = agoraRef.current;
                // Stop and close old video track
                await client.unpublish([localVideoRef.current]);
                localVideoRef.current.stop();
                await localVideoRef.current.close();
                localVideoRef.current = null;
                // Create new track with opposite facingMode
                const newVideo = await window.AgoraRTC.createCameraVideoTrack({
                  encoderConfig: "480p_1",
                  facingMode: newFront ? "user" : "environment"
                });
                localVideoRef.current = newVideo;
                await client.publish([newVideo]);
                // Re-play local preview
                if(localVideoElRef.current) newVideo.play(localVideoElRef.current);
              }catch(e){ console.error("flipCam:",e); }
            }},
          ]:[]),
        ].map((b,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <button onClick={b.action} style={{width:b.end?62:52,height:b.end?62:52,borderRadius:b.end?31:26,background:b.end?"linear-gradient(135deg,#ef4444,#dc2626)":b.active?`${primary}55`:"rgba(239,68,68,0.8)",border:`1px solid ${b.end?"transparent":b.active?primary:"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:b.end?"0 4px 20px rgba(239,68,68,0.5)":undefined}}>{b.icon}</button>
            <span style={{color:"#aaa",fontSize:10}}>{b.label}</span>
          </div>
        ))}
      </div>
      <style>{CSS}</style>
    </div>
  );

  // ── CHAT ──────────────────────────────────────────────────────────────────
  if(screen==="chat"){
    const sendMsg=()=>{
      if(!chatInput.trim())return;
      const t=now();
      const nm={id:Date.now(),from:"me",text:chatInput,time:t,status:"sent"};
      setMessages(p=>[...p,nm]); setChatInput(""); addXp(5,"رسالة");
      // update real stats and quests
      setStats(s=>{ const ns={...s,totalMsgs:s.totalMsgs+1}; checkBadges(ns); return ns; });
      updateQuest("msgs");
      setCoins(c=>c+1);
      if(roomRef.current){
        roomRef.current.send({type:"broadcast",event:"msg",payload:{text:chatInput,time:t}});
        setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"delivered"}:m)),600);
        setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1200);
      }
    };
    return(
      <div style={{background:bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",fontFamily:"'Tajawal',system-ui",color:text}}>
        <div style={{background:card,backdropFilter:"blur(20px)",borderBottom:`1px solid ${border}`,display:"flex",alignItems:"center",gap:10,padding:"12px 14px",boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",cursor:"pointer",padding:6}}>{Ic.back(muted)}</button>
          <Av src={partner.av} size={36}/>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{partner.name}</div><div style={{fontSize:11,color:isTyping?"#22c55e":muted,display:"flex",alignItems:"center",gap:4}}>{isTyping?<><span>يكتب الآن</span><span>...</span></>:<><div style={{width:6,height:6,borderRadius:3,background:"#22c55e"}}/><span>متصل</span></>}</div></div>
          <button onClick={()=>setShowBlock(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6}}>{Ic.flag(muted)}</button>
          <button onClick={()=>{setCallType("video");setScreen("call");setTimeout(()=>joinAgora((roomId||"ailo_"+Date.now()).replace(/[^a-zA-Z0-9_]/g,'').slice(0,64),"video"),300);}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.video(primary,18)}</button>
          <button onClick={()=>{setCallType("voice");setScreen("call");setTimeout(()=>joinAgora((roomId||"ailo_"+Date.now()).replace(/[^a-zA-Z0-9_]/g,'').slice(0,64),"voice"),300);}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.phone(primary,18)}</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:9}}>
          <div style={{alignSelf:"center",background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"5px 14px",display:"flex",alignItems:"center",gap:5,fontSize:11,color:muted}}>{Ic.shield("#22c55e",11)}<span>محادثة مشفرة</span></div>
          {messages.map(m=>(
            <div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"76%"}}>
              <div style={{background:m.from==="me"?`linear-gradient(135deg,${primary},${secondary})`:card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":text,padding:m.isImage?"6px":"10px 15px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.6,border:`1px solid ${border}`,boxShadow:m.from==="me"?`0 4px 14px ${glow}`:"0 2px 8px rgba(0,0,0,0.07)",overflow:"hidden"}}>
                {m.isImage&&m.imageData?<img src={m.imageData} style={{maxWidth:220,maxHeight:200,borderRadius:12,display:"block"}} alt=""/>:m.text}
              </div>
              <div style={{fontSize:10,color:muted,marginTop:3,display:"flex",justifyContent:m.from==="me"?"flex-end":"flex-start",alignItems:"center",gap:4}}>{m.time}{m.from==="me"&&(m.status==="read"?Ic.checks("#22c55e",13):m.status==="delivered"?Ic.checks(muted,13):Ic.check(muted,12))}</div>
            </div>
          ))}
          {isTyping&&<div style={{alignSelf:"flex-start",background:card,backdropFilter:"blur(10px)",padding:"12px 16px",borderRadius:"18px 18px 18px 4px",display:"flex",gap:5,border:`1px solid ${border}`}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:3.5,background:primary,animationName:`dot${i}`,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>}
          <div ref={msgEnd}/>
        </div>
        <div style={{padding:"10px 12px",background:card,backdropFilter:"blur(20px)",borderTop:`1px solid ${border}`}}>
          <input ref={fileRef} type="file" accept="image/*,application/pdf,.doc,.docx" style={{display:"none"}} onChange={e=>{
            const f=e.target.files?.[0]; if(!f)return;
            const isImg=f.type.startsWith("image/");
            if(isImg){
              const reader=new FileReader();
              reader.onload=(ev)=>{
                // Compress image before sending (max 400px, quality 0.6)
                const img=new Image();
                img.onload=()=>{
                  const canvas=document.createElement("canvas");
                  const max=400; const ratio=Math.min(max/img.width,max/img.height,1);
                  canvas.width=img.width*ratio; canvas.height=img.height*ratio;
                  canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
                  const imageData=canvas.toDataURL("image/jpeg",0.6);
                  const nm={id:Date.now(),from:"me",text:`📷 صورة`,time:now(),status:"sent",isImage:true,imageData};
                  setMessages(p=>[...p,nm]); addXp(3,"صورة"); setCoins(c=>c+1);
                  if(roomRef.current) roomRef.current.send({type:"broadcast",event:"msg",payload:{text:`📷 صورة`,time:now(),isImage:true,imageData}});
                  setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1000);
                };
                img.src=ev.target.result;
              };
              reader.readAsDataURL(f);
            } else {
              const nm={id:Date.now(),from:"me",text:`📎 ${f.name}`,time:now(),status:"sent"};
              setMessages(p=>[...p,nm]); addXp(3,"مرفق");
              if(roomRef.current) roomRef.current.send({type:"broadcast",event:"msg",payload:{text:`📎 ${f.name}`,time:now()}});
              setTimeout(()=>setMessages(p=>p.map(m=>m.id===nm.id?{...m,status:"read"}:m)),1000);
            }
            e.target.value="";
          }}/>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{if(fileRef.current){fileRef.current.accept="application/pdf,.doc,.docx,.txt";fileRef.current.click();}}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.7,display:"flex"}}>{Ic.attach(muted)}</button>
            <button onClick={()=>{if(fileRef.current){fileRef.current.accept="image/*";fileRef.current.click();}}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.7,display:"flex"}}>{Ic.image(muted)}</button>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="اكتب رسالة..." style={{...inp,flex:1,padding:"10px 14px",borderRadius:50}}/>
            <button onClick={sendMsg} style={{width:42,height:42,borderRadius:21,background:`linear-gradient(135deg,${primary},${secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px ${glow}`}}>{Ic.send("white")}</button>
          </div>
        </div>
        {showBlock&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowBlock(false)}>
            <div style={{...glass({width:"100%",borderRadius:"22px 22px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:800,fontSize:16,marginBottom:14}}>إجراءات الخصوصية</div>
              {[{icon:Ic.block("#ef4444"),label:`حظر ${partner.name}`,c:"#ef4444",action:()=>{setBlocked(b=>[...b,partner.name]);setShowBlock(false);setScreen("home");}},{icon:Ic.flag("#f59e0b"),label:"إبلاغ عن سلوك مسيء",c:"#f59e0b",action:()=>setShowBlock(false)}].map((b,i)=>(
                <button key={i} onClick={b.action} style={{width:"100%",background:`${b.c}11`,border:`1px solid ${b.c}44`,borderRadius:14,padding:14,display:"flex",alignItems:"center",gap:12,cursor:"pointer",color:b.c,fontWeight:700,marginBottom:10,fontFamily:"'Tajawal',system-ui"}}>{b.icon}<span>{b.label}</span></button>
              ))}
            </div>
          </div>
        )}
        <style>{CSS}</style>
      </div>
    );
  }

  // ── MAIN ──────────────────────────────────────────────────────────────────
  const TABS=[
    {id:"home",     label:"الرئيسية", icon:Ic.home},
    {id:"messages", label:"الرسائل",  icon:Ic.chat},
    {id:"exercises",label:"تدريبات",  icon:Ic.star},
    {id:"leaderboard",label:"الصدارة",icon:Ic.trophy},
    {id:"history",  label:"السجل",    icon:Ic.clock},
  ];

  return(
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",paddingBottom:72,position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",top:-100,right:-100,width:280,height:280,borderRadius:"50%",background:glow,filter:"blur(80px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-100,left:-100,width:250,height:250,borderRadius:"50%",background:`${accent}18`,filter:"blur(80px)",pointerEvents:"none",zIndex:0}}/>

      {xpPopup&&<div style={{position:"fixed",top:88,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",padding:"7px 18px",borderRadius:50,fontWeight:700,fontSize:13,zIndex:500,animation:"fadeUp 0.4s ease",pointerEvents:"none",boxShadow:`0 4px 18px ${glow}`,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>{Ic.zap("white",13)} +{xpPopup.amt} XP · {xpPopup.label}</div>}

      {/* HEADER */}
      <div style={{background:card,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:`1px solid ${border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setShowProfileView(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av src={profile.avatar} size={40}/></button>
          <div style={{fontWeight:900,fontSize:22,color:primary,letterSpacing:1}}>✦ Ailo</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setDarkMode(d=>!d)} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:"7px 8px",display:"flex",alignItems:"center",gap:4}}>
              {darkMode?Ic.sun(primary,16):Ic.moon(primary,16)}
            </button>
            <button onClick={()=>{setShowNotif(p=>!p);}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex",position:"relative"}}>
              {Ic.bell(primary,17)}
              {unreadCount>0&&<div style={{position:"absolute",top:3,right:3,minWidth:16,height:16,borderRadius:8,background:"#ef4444",color:"white",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",boxShadow:"0 0 5px #ef4444"}}>{unreadCount>9?"9+":unreadCount}</div>}
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.cog(primary,17)}</button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",borderRadius:50,padding:"2px 10px",fontSize:11,fontWeight:800,flexShrink:0,boxShadow:`0 2px 10px ${glow}`}}>Lv.{lvl.level}</div>
          <div style={{flex:1}}><XPBar pct={lvl.pct} primary={primary} accent={accent}/></div>
          <span style={{fontSize:10,color:muted,flexShrink:0}}>{lvl.current}/{lvl.needed}</span>
          <button onClick={()=>setShowCoinsInfo(true)} style={{background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:50,padding:"2px 8px",display:"flex",alignItems:"center",gap:3,flexShrink:0,cursor:"pointer"}}><span style={{fontSize:12}}>🪙</span><span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{coins}</span></button>
          <div style={{background:"rgba(239,68,68,0.15)",borderRadius:50,padding:"2px 8px",fontSize:11,fontWeight:700,color:"#ef4444",flexShrink:0}} style={{display:"flex",alignItems:"center",gap:3}}><span style={{color:"#ef4444",fontSize:13}}>🔥</span><span>{streak}</span></div>
        </div>
      </div>

      {/* NOTIF PANEL */}
      {showNotif&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",zIndex:100}} onClick={()=>setShowNotif(false)}>
          <div style={{...glass({margin:"68px 14px 0",borderRadius:20,padding:0,overflow:"hidden",maxHeight:"75vh",display:"flex",flexDirection:"column"})}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{padding:"14px 16px",borderBottom:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:14,background:"#6366f133",border:"1px solid #6366f144"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="#6366f133" stroke="#818cf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></span>الإشعارات</span>
                {unreadCount>0&&<div style={{background:"#ef4444",color:"white",borderRadius:50,padding:"1px 7px",fontSize:11,fontWeight:700}}>{unreadCount}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {unreadCount>0&&<button onClick={markAllRead} style={{background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"3px 10px",fontSize:11,cursor:"pointer",color:primary,fontFamily:"'Tajawal',system-ui"}}>قراءة الكل</button>}
                {notifications.length>0&&<button onClick={()=>setNotifications([])} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:50,padding:"3px 10px",fontSize:11,cursor:"pointer",color:"#ef4444",fontFamily:"'Tajawal',system-ui"}}>مسح الكل</button>}

            <div style={{overflowY:"auto",flex:1}}>
              {notifications.length===0?(
                <div style={{textAlign:"center",padding:"40px 20px",color:muted}}>

              ):notifications.map((n,i)=>{
                const typeColor={info:primary,match:"#10b981",msg:"#6366f1",call:"#f59e0b",badge:"#f472b6",quest:"#22c55e",levelup:"#8b5cf6"}[n.type]||primary;
                return(
                  <div key={n.id} onClick={()=>setNotifications(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x))} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",borderBottom:i<notifications.length-1?`1px solid ${border}`:"none",background:n.read?"transparent":`${typeColor}08`,cursor:"pointer",transition:"background 0.2s"}}>
                    <div style={{width:38,height:38,borderRadius:19,background:`${typeColor}20`,border:`1px solid ${typeColor}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,marginBottom:2}}>
                        <span style={{fontWeight:700,fontSize:13,color:n.read?text:typeColor}}>{n.title}</span>
                        <span style={{fontSize:10,color:muted,flexShrink:0}}>{n.time}</span>
                      </div>
                      <div style={{fontSize:12,color:muted,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.body}</div>
                    </div>
                    {!n.read&&<div style={{width:8,height:8,borderRadius:4,background:typeColor,flexShrink:0,marginTop:4}}/>}
                    <button onClick={e=>{e.stopPropagation();deleteNotif(n.id);}} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:16,padding:"0 2px",flexShrink:0,lineHeight:1}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      <div style={{padding:14,position:"relative",zIndex:1}}>

        {/* HOME */}
        {tab==="home"&&<div style={{animation:"slideIn 0.4s ease"}}>
          <div style={{...glass({marginBottom:14,padding:20,background:`linear-gradient(135deg,${primary}22,${accent}11)`})}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Av src={profile.avatar} size={56}/>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{profile.name}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{profile.status}</div><div style={{display:"flex",gap:6,marginTop:6}}><div style={tag(primary)}>{profile.lang}</div><div style={tag("#22c55e")}>Lv.{lvl.level}</div></div></div>
            </div>

              {icon:"🏆",name:"شارة VIP",desc:"شارة حصرية على ملفك",price:500,action:()=>{const e=load("badges_earned",[]);if(!e.includes("vip"))save("badges_earned",[...e,"vip"]);}},
            ].map(item=>(
              <div key={item.id} style={{...glass({marginBottom:10,display:"flex",alignItems:"center",gap:12})}}>
                <div style={{fontSize:32,flexShrink:0}}>{item.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{item.name}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{item.desc}</div></div>
                <button onClick={()=>{ if(coins>=item.price){setCoins(c=>c-item.price);item.action();addXp(5,"شراء"); } }} disabled={coins<item.price} style={{background:coins>=item.price?`linear-gradient(135deg,${primary},${secondary})`:"rgba(128,128,128,0.2)",border:"none",borderRadius:50,padding:"7px 14px",color:"white",fontSize:12,fontWeight:700,cursor:coins>=item.price?"pointer":"not-allowed",fontFamily:"'Tajawal',system-ui",flexShrink:0}}>{item.price} 🪙</button>
              </div>
            ))}
          </div>}

          {!storeTab&&<>
            {/* ── STEP 1: اختيار اللغة ── */}
            {exStep==="lang"&&<>
              <div style={{fontWeight:800,fontSize:15,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>{Ic.star(primary,16)}<span>اختر اللغة التي تريد تعلمها</span></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {LANGS_EX.map(l=>{
                  const prog=langProgress[l.code];
                  return(
                    <button key={l.code} onClick={()=>{setExLang(l);setExStep("topic");}} style={{...glass({display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",border:`1px solid ${exLang?.code===l.code?primary:border}`,background:exLang?.code===l.code?`${primary}22`:card,textAlign:"right"})}}>
                      <div style={{width:56,height:40,borderRadius:10,overflow:"hidden",flexShrink:0,border:"1px solid rgba(128,128,128,0.2)",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
                        <img src={l.flag} alt={l.name} style={{width:"100%",height:"100%",objectFit:l.fit||"cover"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13}}>{l.name}</div>
                        {prog&&<div style={{color:primary,fontSize:10,marginTop:2}} style={{display:"flex",alignItems:"center",gap:3}}><svg width="9" height="9" viewBox="0 0 24 24" fill={primary} stroke={primary} strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>{prog.score} نقطة</div>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </>}

            {/* ── STEP 2: اختيار الموضوع ── */}
            {exStep==="topic"&&exLang&&<>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <button onClick={()=>setExStep("lang")} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui"}}>{Ic.back(muted,16)} رجوع</button>
                <div style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:6}}><span>{exLang.flag}</span><span>{exLang.name}</span></div>
              </div>
              <div style={{fontWeight:700,fontSize:13,color:muted,marginBottom:12}}>اختر الموضوع:</div>
              {exLoading?(
                <div style={{...glass({textAlign:"center",padding:40})}}>
                  <div style={{fontSize:40,animation:"spin 1s linear infinite",marginBottom:12}}>⟳</div>
                  <div style={{color:muted,fontSize:13}}>دعني أُفكر قليلاً... 🤔</div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {TOPICS.map(t=>(
                    <button key={t.key} onClick={()=>{setExTopic(t);generateExercises(exLang.code,t.name);}} style={{...glass({display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"16px 10px",cursor:"pointer"})}}>
                      <span style={{fontSize:28}}>{t.icon}</span>
                      <span style={{fontWeight:700,fontSize:12}}>{t.name}</span>
                    </button>
                  ))}
                </div>
              )}
            </>}

            {/* ── STEP 3: الاختبار ── */}
            {exStep==="quiz"&&exQuestions.length>0&&(()=>{
              const q=exQuestions[exIdx];
              const isLast=exIdx===exQuestions.length-1;
              if(!q) return null;

              const speakWord=(word)=>{if(window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang=exLang?.code==="Arabic"?"ar-SA":exLang?.code==="French"?"fr-FR":exLang?.code==="Spanish"?"es-ES":exLang?.code==="German"?"de-DE":exLang?.code==="Chinese"?"zh-CN":exLang?.code==="Japanese"?"ja-JP":exLang?.code==="Korean"?"ko-KR":exLang?.code==="Turkish"?"tr-TR":exLang?.code==="Portuguese"?"pt-PT":exLang?.code==="Italian"?"it-IT":exLang?.code==="Russian"?"ru-RU":"en-US";window.speechSynthesis.speak(u);}};

              const goNext=(correct)=>{
                if(q.word&&exLang&&exTopic) updateSrsCard(exLang.code,exTopic.key||exTopic.name||"g",q.word,correct);
                if(correct){setExScore(s=>s+1);addXp(15,"إجابة صحيحة");setStats(s=>{const ns={...s,srsTotal:s.srsTotal+1};checkBadges(ns);return ns;});updateQuest("srs");}
                else setSessionErrors(e=>[...e,q.word||""]);
                setTimeout(()=>{
                  setExAnswer(null);setExSpeechResult("");setExSpeechScore(null);setExSpeechListening(false);
                  if(isLast){
                    const finalScore=exScore+(correct?1:0);
                    const lp={...langProgress,[exLang.code]:{score:(langProgress[exLang.code]?.score||0)+finalScore,lastTopic:exTopic?.name,date:new Date().toLocaleDateString("ar")}};
                    setLangProgress(lp);saveLangProgress(lp);
                    const newTotalXp=totalXp+finalScore*15;
                    setTimeout(()=>pushLB(newTotalXp).then(()=>fetchLB()),500);
                    addNotif("🎓","انتهيت من التمرين!",`أجبت ${finalScore} من ${exQuestions.length} في ${exLang?.name}`,"quest");
                    save("ex_session",null);
                    const errors=[...sessionErrors,...(correct?[]:[q.word||""])].filter(Boolean);
                    const cdQ=exQuestions.filter(eq=>errors.includes(eq.word)).slice(0,5);
                    setExResult({score:finalScore,total:exQuestions.length,lang:exLang,topic:exTopic});
                    if(cdQ.length>0){setCooldownQ(cdQ);setCooldownIdx(0);setCooldownAns(null);setExStep("cooldown");}
                    else setExStep("result");
                  } else {
                    setExIdx(x=>x+1);
                    save("ex_session",{lang:exLang,topic:exTopic,questions:exQuestions,idx:exIdx+1,score:exScore+(correct?1:0)});
                  }
                },1200);
              };

              // وسم المرحلة
              const idx1=exIdx+1,total=exQuestions.length;
              const warm=Math.ceil(total*0.3),newQ=Math.ceil(total*0.4),intense=Math.ceil(total*0.2);
              let phase,pColor,pIcon,pNum,pTotal;
              if(idx1<=warm){phase="إحماء";pColor="#6366f1";pIcon="🔥";pNum=idx1;pTotal=warm;}
              else if(idx1<=warm+newQ){phase="جديد";pColor="#22c55e";pIcon="🆕";pNum=idx1-warm;pTotal=newQ;}
              else if(idx1<=warm+newQ+intense){phase="مكثف";pColor="#f59e0b";pIcon="💪";pNum=idx1-warm-newQ;pTotal=intense;}
              else{phase="تحدي";pColor="#ef4444";pIcon="🏆";pNum=idx1-warm-newQ-intense;pTotal=total-warm-newQ-intense;}

              return(<>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <button onClick={()=>{setExStep("topic");setExAnswer(null);save("ex_session",null);}} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui"}}>{Ic.back(muted,16)} رجوع</button>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:muted,marginBottom:4}}>
                      <span>{exLang?.name} — {exTopic?.name}</span>
                      <span>{exIdx+1}/{exQuestions.length}</span>
                    </div>
                    <XPBar pct={Math.round((exScore/exQuestions.length)*100)} primary={primary} accent={accent}/>
                  </div>
                  <div style={{background:"#22c55e22",border:"1px solid #22c55e44",borderRadius:50,padding:"3px 8px",fontSize:11,fontWeight:700,color:"#22c55e"}}>{exScore}</div>
                </div>

                {/* وسم المرحلة */}
                <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
                  <div style={{background:`${pColor}22`,border:`1px solid ${pColor}44`,borderRadius:50,padding:"4px 14px",fontSize:12,fontWeight:700,color:pColor,display:"flex",alignItems:"center",gap:5}}>
                    <span>{pIcon}</span><span>{phase}</span><span style={{opacity:0.7,fontSize:11}}>{pNum}/{pTotal}</span>
                  </div>
                </div>

                <div style={{...glass({padding:"18px 14px",marginBottom:12,background:`linear-gradient(135deg,${primary}18,${accent}0a)`})}}>

                  {/* MCQ */}
                  {(!q.type||q.type==="mcq")&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:8,textAlign:"center"}}>{q.q}</div>
                    <div style={{fontWeight:900,fontSize:30,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:18,textAlign:"center"}}>{q.word}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {q.options?.map((o,i)=>{let bg2=card,bc=border,co=text;if(exAnswer!==null){if(i===q.answer){bg2="#22c55e22";bc="#22c55e";co="#22c55e";}else if(i===exAnswer){bg2="#ef444422";bc="#ef4444";co="#ef4444";}}return(<button key={i} onClick={()=>{if(exAnswer!==null)return;setExAnswer(i);goNext(i===q.answer);}} style={{background:bg2,border:`2px solid ${bc}`,borderRadius:13,padding:"13px 9px",fontWeight:700,fontSize:14,cursor:"pointer",color:co,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s",textAlign:"right"}}>{o}</button>);})}
                    </div>
                  </>}

                  {/* ARRANGE */}
                  {q.type==="arrange"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:10,textAlign:"center"}}>{q.q}</div>
                    <div style={{minHeight:50,background:"rgba(128,128,128,0.1)",borderRadius:12,padding:8,marginBottom:12,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"flex-start",border:`1px solid ${border}`,direction:"ltr"}}>
                      {exArrSel.map((w,i)=>(<button key={i} onClick={()=>{setExArrSel(s=>s.filter((_,j)=>j!==i));setExArrWords(ws=>[...ws,w]);}} style={{background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontFamily:"sans-serif"}}>{w}</button>))}
                      {exArrSel.length===0&&<span style={{color:muted,fontSize:12,lineHeight:"38px",paddingLeft:4}}>اضغط الكلمات بالترتيب...</span>}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:12,direction:"ltr"}}>
                      {exArrWords.map((w,i)=>(<button key={`${w}-${i}`} onClick={()=>{setExArrSel(s=>[...s,w]);setExArrWords(ws=>ws.filter((_,j)=>j!==i));}} style={{background:card,border:`1px solid ${border}`,borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",color:text,fontFamily:"sans-serif"}}>{w}</button>))}
                    </div>
                    {exAnswer==="wrong"&&<div style={{color:"#ef4444",fontSize:12,textAlign:"center",marginBottom:8}}>الصحيح: {q.answer}</div>}
                    {exAnswer==="correct"&&<div style={{color:"#22c55e",fontSize:12,textAlign:"center",marginBottom:8}}>✅ ممتاز!</div>}
                    <button onClick={()=>{if(exArrSel.length===0)return;const ok=exArrSel.join(" ")===q.answer;setExAnswer(ok?"correct":"wrong");goNext(ok);}} style={btnP({width:"100%"})}>تحقق ✓</button>
                  </>}

                  {/* CLOZE */}
                  {q.type==="cloze"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:10,textAlign:"center"}}>{q.q}</div>
                    <div style={{fontWeight:700,fontSize:15,color:primary,textAlign:"center",marginBottom:16,padding:"12px",background:`${primary}11`,borderRadius:12,border:`1px solid ${border}`,lineHeight:1.9}}>{q.sentence}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {q.options?.map((o,i)=>{let bg2=card,bc=border,co=text;if(exAnswer!==null){if(i===q.answer){bg2="#22c55e22";bc="#22c55e";co="#22c55e";}else if(i===exAnswer){bg2="#ef444422";bc="#ef4444";co="#ef4444";}}return(<button key={i} onClick={()=>{if(exAnswer!==null)return;setExAnswer(i);goNext(i===q.answer);}} style={{background:bg2,border:`2px solid ${bc}`,borderRadius:13,padding:"13px 9px",fontWeight:700,fontSize:14,cursor:"pointer",color:co,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s"}}>{o}</button>);})}
                    </div>
                  </>}

                  {/* FLASHCARD */}
                  {q.type==="flashcard"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:10,textAlign:"center"}}>اضغط البطاقة لرؤية المعنى</div>
                    <div onClick={()=>{setExCardFlipped(f=>!f);if(!exCardFlipped)speakWord(q.word);}} style={{cursor:"pointer",background:exCardFlipped?`${primary}22`:card,border:`2px solid ${exCardFlipped?primary:border}`,borderRadius:16,padding:"26px 16px",textAlign:"center",marginBottom:16,transition:"all 0.3s",minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
                      {!exCardFlipped
                        ?<div style={{fontWeight:900,fontSize:32,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{q.word}</div>
                        :<>
                          <div style={{fontWeight:800,fontSize:22,color:primary}}>{q.meaning}</div>
                          {q.pronunciation&&<div onClick={(e)=>{e.stopPropagation();speakWord(q.word);}} style={{color:primary,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={primary} strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
                            {q.pronunciation}
                          </div>}
                          {q.example&&<div style={{color:muted,fontSize:12,fontStyle:"italic"}}>"{q.example}"</div>}
                        </>}
                    </div>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={()=>{setExCardFlipped(false);goNext(false);}} style={{flex:1,padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>لم أتذكر 😕</button>
                      <button onClick={()=>{setExCardFlipped(false);goNext(true);}} style={btnP({flex:1,fontSize:13})}>تذكرت! ✓</button>
                    </div>
                  </>}

                  {/* PAIRS */}
                  {q.type==="pairs"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:12,textAlign:"center"}}>{q.q}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {q.pairs?.map(([a],i)=>(<button key={i} onClick={()=>setExPairSel(a)} disabled={!!exPairDone[a]} style={{background:exPairSel===a?`linear-gradient(135deg,${primary},${secondary})`:exPairDone[a]?"rgba(34,197,94,0.2)":card,border:`2px solid ${exPairSel===a?primary:exPairDone[a]?"#22c55e":border}`,borderRadius:11,padding:11,fontSize:13,cursor:"pointer",color:exPairDone[a]?"#22c55e":exPairSel===a?"white":text,fontWeight:700,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s",opacity:exPairDone[a]?0.5:1}}>{a}</button>))}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {(exPairShuffled.length>0?exPairShuffled:q.pairs||[]).map(([,b],i)=>(<button key={i} onClick={()=>{if(!exPairSel)return;const cp=q.pairs.find(([a])=>a===exPairSel);if(cp&&cp[1]===b){const np={...exPairDone,[exPairSel]:b};setExPairDone(np);setExPairSel(null);if(Object.keys(np).length===q.pairs.length)goNext(true);}else setExPairSel(null);}} disabled={Object.values(exPairDone).includes(b)} style={{background:Object.values(exPairDone).includes(b)?"rgba(34,197,94,0.2)":card,border:`2px solid ${Object.values(exPairDone).includes(b)?"#22c55e":border}`,borderRadius:11,padding:11,fontSize:13,cursor:"pointer",color:Object.values(exPairDone).includes(b)?"#22c55e":text,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s",opacity:Object.values(exPairDone).includes(b)?0.5:1}}>{b}</button>))}
                      </div>
                    </div>
                  </>}

                  {/* SPEECH */}
                  {q.type==="speech"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:10,textAlign:"center"}}>{q.q}</div>
                    <div style={{fontWeight:900,fontSize:28,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:6,textAlign:"center"}}>{q.word}</div>
                    {q.sentence&&<div style={{color:muted,fontSize:12,textAlign:"center",marginBottom:16,fontStyle:"italic"}}>"{q.sentence}"</div>}
                    <div style={{textAlign:"center",marginBottom:12}}>
                      <button onClick={()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setExSpeechResult("المتصفح لا يدعم التعرف على الصوت");return;}const rec=new SR();rec.lang=exLang?.code==="French"?"fr-FR":exLang?.code==="Spanish"?"es-ES":exLang?.code==="German"?"de-DE":exLang?.code==="Chinese"?"zh-CN":exLang?.code==="Japanese"?"ja-JP":exLang?.code==="Korean"?"ko-KR":"en-US";rec.interimResults=false;setExSpeechListening(true);setExSpeechResult("");setExSpeechScore(null);rec.start();rec.onresult=(e)=>{const said=e.results[0][0].transcript.trim().toLowerCase();const target=q.word.toLowerCase();const sc=said===target?100:said.includes(target)||target.includes(said)?70:Math.round(said.split("").filter(c=>target.includes(c)).length/target.length*100);setExSpeechResult(said);setExSpeechListening(false);setExSpeechScore(sc);};rec.onerror=()=>{setExSpeechListening(false);setExSpeechResult("لم أسمعك، حاول مرة أخرى");};rec.onend=()=>setExSpeechListening(false);}} style={{width:72,height:72,borderRadius:36,background:exSpeechListening?`linear-gradient(135deg,#ef4444,#f97316)`:`linear-gradient(135deg,${primary},${secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",boxShadow:exSpeechListening?`0 0 24px rgba(239,68,68,0.6)`:`0 4px 20px ${glow}`,transition:"all 0.3s"}}>
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>
                      </button>
                      {exSpeechListening&&<div style={{color:primary,fontSize:12,marginTop:8}}>🎤 جاري الاستماع...</div>}
                    </div>
                    {exSpeechResult&&<div style={{...glass({textAlign:"center",padding:10,marginBottom:10})}}>
                      <div style={{color:muted,fontSize:11}}>قلت: <b>{exSpeechResult}</b></div>
                      {exSpeechScore!==null&&<div style={{fontWeight:900,fontSize:20,color:exSpeechScore>=70?"#22c55e":exSpeechScore>=40?"#f59e0b":"#ef4444",marginTop:4}}>{exSpeechScore}%</div>}
                    </div>}
                    {exSpeechScore!==null&&<div style={{display:"flex",gap:8}}>
                      <button onClick={()=>{setExSpeechResult("");setExSpeechScore(null);}} style={{flex:1,padding:"11px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إعادة 🔄</button>
                      <button onClick={()=>{setExSpeechResult("");setExSpeechScore(null);goNext(exSpeechScore>=70);}} style={btnP({flex:1,fontSize:12})}>التالي ←</button>
                    </div>}
                    {!exSpeechResult&&!exSpeechListening&&<div style={{color:muted,fontSize:11,textAlign:"center"}}>اضغط الميكروفون وانطق الكلمة</div>}
                  </>}

                </div>
              </>);
            })()}

            {/* ── STEP 4: Cool-down ── */}
            {exStep==="cooldown"&&cooldownQ.length>0&&(()=>{
              const q=cooldownQ[cooldownIdx];
              const isLast=cooldownIdx>=cooldownQ.length-1;
              if(!q) return null;
              // Cool-down: نعرض الكلمة ونطلب معناها بالعربية
              const allWords=exQuestions.filter(eq=>eq.meaning||eq.options).map(eq=>eq.meaning||(eq.options?.[eq.answer])||"").filter(Boolean);
              const correctMeaning=q.meaning||(q.options?.[q.answer])||q.word;
              const wrongOpts=[...new Set(allWords.filter(m=>m!==correctMeaning))].slice(0,3);
              while(wrongOpts.length<3) wrongOpts.push(["خطأ","غلط","لا أعرف","لا شيء"][wrongOpts.length]||"—");
              const opts=[correctMeaning,...wrongOpts].sort(()=>Math.random()-0.5);
              const ans=opts.indexOf(correctMeaning);
              return(<>
                <div style={{...glass({textAlign:"center",padding:"14px",marginBottom:12,background:"linear-gradient(135deg,#ef444418,#f9731618)"})}}>
                  <div style={{fontSize:24,marginBottom:4}}>🔁</div>
                  <div style={{fontWeight:800,fontSize:14,color:"#ef4444"}}>مراجعة الأخطاء</div>
                  <div style={{color:muted,fontSize:11}}>{cooldownIdx+1} من {cooldownQ.length}</div>
                </div>
                <div style={{...glass({padding:"18px 14px",marginBottom:12})}}>
                  <div style={{color:muted,fontSize:12,marginBottom:8,textAlign:"center"}}>{q.q||"ترجم"}</div>

                    {opts.map((o,i)=>{let bg2=card,bc=border,co=text;if(cooldownAns!==null){if(i===ans){bg2="#22c55e22";bc="#22c55e";co="#22c55e";}else if(i===cooldownAns){bg2="#ef444422";bc="#ef4444";co="#ef4444";}}return(<button key={i} onClick={()=>{if(cooldownAns!==null)return;setCooldownAns(i);const ok=i===ans;if(ok)updateSrsCard(exLang?.code,exTopic?.key||exTopic?.name||"g",q.word,true);setTimeout(()=>{setCooldownAns(null);if(isLast){setExStep("result");addNotif("✅","مراجعة مكتملة!","راجعت كل الأخطاء 🎯","quest");}else setCooldownIdx(x=>x+1);},1200);}} style={{background:bg2,border:`2px solid ${bc}`,borderRadius:13,padding:"13px 9px",fontWeight:700,fontSize:14,cursor:"pointer",color:co,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s",textAlign:"right"}}>{o}</button>);})}

            {/* ── STEP 5: Result ── */}

              const cupColor=isGold?"#f59e0b":isSilver?"#94a3b8":"#cd7f32";

              const rank=isGold?"#1":isSilver?"#2":"#3";
              return(<>
                <style>{`@keyframes spinY{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}@keyframes pulseR{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}`}</style>

                </div>
              </>);

          </>}
        </div>}

        {/* LEADERBOARD */}

            {/* قائمة الأصدقاء + أنا */}
            {(()=>{

                  </div>
                ));
            })()}
          </>}

          {/* تبويب لغتي */}
          {lbTab==="mylang"&&<>
            <div style={{fontWeight:800,fontSize:14,color:primary,marginBottom:10}}>🗣️ ناطقو {profile.lang||"عربية"}</div>

              <div key={u.user_id||i} style={{...glass({marginBottom:8,display:"flex",alignItems:"center",gap:12,padding:"12px 14px",border:u.user_id===userId?`1px solid ${primary}`:""})}}>
                <div style={{width:28,fontWeight:900,fontSize:i<3?18:14,color:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7f32":muted,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}</div>

                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{u.name}</div><div style={{color:muted,fontSize:10}}>{u.short_id}</div></div>
                <div style={{...tag(primary),fontWeight:800}}>{(u.xp||0).toLocaleString()} XP</div>
              </div>
            ))}
            {lbUsers.length===0&&<div style={{...glass({textAlign:"center",padding:24,color:muted})}}>لا توجد بيانات</div>}
          </>}

          {/* تجميد السلسلة */}
          <div style={{...glass({marginTop:12})}}>

                <div style={{color:muted,fontSize:11,marginTop:2}}>احمِ سلسلتك ليوم واحد</div>

              <button onClick={()=>{if(coins>=50){setCoins(c=>c-50);setStreakFrozen(true);save("streakFrozen",true);}}} disabled={coins<50||streakFrozen} style={btnP({padding:"10px 18px",fontSize:12,opacity:coins<50?0.5:1,background:streakFrozen?`linear-gradient(135deg,#22c55e,#16a34a)`:undefined})}>{streakFrozen?"✅ مفعّل":"50 🪙"}</button>

        <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22,maxHeight:"88vh",overflowY:"auto"})}} onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:900,fontSize:17,marginBottom:16,textAlign:"center",background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>✏️ تعديل الملف الشخصي</div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{width:88,height:88,borderRadius:44,overflow:"hidden",margin:"0 auto",border:`3px solid ${primary}`,boxShadow:`0 0 0 4px ${glow},0 8px 24px rgba(0,0,0,0.2)`}}>
              {profile.avatar.startsWith("http")?<img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:58,lineHeight:"88px",display:"block"}}>{profile.avatar}</span>}

          {photoMode==="gallery"&&<div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:14}}>{SEEDS.map(seed=>{const url=avUrl(seed);const sel=profile.avatar===url;return(<button key={seed} onClick={()=>setProfile(p=>({...p,avatar:url}))} style={{background:sel?`${primary}33`:"transparent",border:`2px solid ${sel?primary:border}`,borderRadius:11,padding:3,cursor:"pointer",overflow:"hidden",transition:"all 0.2s",boxShadow:sel?`0 0 12px ${glow}`:undefined}}><img src={url} style={{width:"100%",aspectRatio:"1",borderRadius:7,display:"block"}} alt={seed} loading="lazy"/></button>);})}</div>}
          {[["name","اسم المستخدم"],["bio","نبذة شخصية"],["status","الحالة"]].map(([k,l])=>(<div key={k} style={{marginBottom:10}}><div style={{fontSize:12,color:muted,marginBottom:4}}>{l}</div><input value={profile[k]||""} onChange={e=>setProfile(p=>({...p,[k]:e.target.value}))} style={inp}/></div>))}
          <div style={{marginBottom:16}}><div style={{fontSize:12,color:muted,marginBottom:4}}>لغتي الأم</div><select value={profile.lang} onChange={e=>setProfile(p=>({...p,lang:e.target.value}))} style={{...inp}}>{["Arabic","English","French","Spanish","German","Chinese","Japanese","Turkish"].map(l=><option key={l} value={l}>{l}</option>)}</select></div>
          <div style={{...glass({marginBottom:14,background:`${primary}18`})}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><span style={{fontWeight:700,fontSize:13}}>المستوى {lvl.level}</span><span style={{color:muted,fontSize:11}}>{lvl.current}/{lvl.needed} XP</span></div>
            <XPBar pct={lvl.pct} primary={primary} accent={accent}/>
          </div>
          <button onClick={()=>setShowProfile(false)} style={btnP({width:"100%"})}>حفظ ✓</button>

      {/* SETTINGS MODAL */}
      {showSettings&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSettings(false)}>
        <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:900,fontSize:17,marginBottom:18,textAlign:"center",background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:15,background:`${primary}22`,border:`1px solid ${primary}44`}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={primary} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>الإعدادات</div>

          {/* DARK/LIGHT TOGGLE */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:`1px solid ${border}`,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {darkMode?Ic.moon(primary,20):Ic.sun(primary,20)}
              <div><div style={{fontWeight:700,fontSize:14}}>{darkMode?"الوضع الداكن":"الوضع الفاتح"}</div><div style={{color:muted,fontSize:11,marginTop:1}}>اضغط للتبديل</div></div>
            </div>
            <button onClick={()=>setDarkMode(d=>!d)}
              style={{background:darkMode?`linear-gradient(135deg,${primary},${secondary})`:"rgba(180,180,180,0.3)",border:"none",borderRadius:50,width:56,height:30,position:"relative",cursor:"pointer",transition:"background 0.3s",flexShrink:0,boxShadow:darkMode?`0 2px 10px ${glow}`:undefined}}>
              <div style={{width:22,height:22,borderRadius:11,background:"white",position:"absolute",top:4,transition:"left 0.25s",left:darkMode?30:4,boxShadow:"0 1px 4px rgba(0,0,0,0.25)"}}/>
            </button>
          </div>

          {/* ACCENT COLORS */}
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>🎨 لون التطبيق</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8,marginBottom:20}}>
            {Object.entries(ACCENTS).map(([key,ac2])=>(<button key={key} onClick={()=>setAccentKey(key)} style={{aspectRatio:"1",borderRadius:12,background:`linear-gradient(135deg,${ac2.primary},${ac2.secondary})`,border:accentKey===key?"2.5px solid white":"2.5px solid transparent",cursor:"pointer",fontSize:12,color:"white",fontWeight:800,boxShadow:accentKey===key?`0 0 12px ${ac2.primary}99`:undefined,transition:"all 0.2s"}}>{accentKey===key?"✓":""}</button>))}
          </div>

          {/* ENCRYPTION */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderTop:`1px solid ${border}`,borderBottom:`1px solid ${border}`,marginBottom:18}}>
            {Ic.shield("#22c55e",16)}<div><div style={{fontWeight:700,fontSize:13}}>التشفير الكامل</div><div style={{fontSize:11,color:"#22c55e",marginTop:2}}>✅ مفعّل دائماً</div></div>
          </div>

          {/* BLOCKED USERS */}
          <div style={{marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>🚫 قائمة المحظورين {blocked.length>0&&<span style={{background:"rgba(239,68,68,0.2)",color:"#ef4444",borderRadius:50,padding:"1px 8px",fontSize:11}}>{blocked.length}</span>}</div>
            {blocked.length===0
              ? <div style={{color:muted,fontSize:12,textAlign:"center",padding:"12px 0"}}>لا يوجد مستخدمون محظورون</div>
              : blocked.map((u,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<blocked.length-1?`1px solid ${border}`:"none"}}>
                  <span style={{fontSize:13}}>{u}</span>
                  <button onClick={()=>setBlocked(b=>b.filter((_,j)=>j!==i))} style={{background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"4px 12px",fontSize:11,cursor:"pointer",color:primary,fontFamily:"'Tajawal',system-ui",fontWeight:700}}>فك الحظر ✓</button>
                </div>
              ))
            }
          </div>

          <button onClick={()=>setShowSettings(false)} style={btnP({width:"100%",marginBottom:10})}>حفظ ✓</button>

          {/* LOGOUT */}
          <button onClick={()=>{setShowSettings(false);setAppScreen("login");setAuthForm({name:"",email:"",password:"",lang:"Arabic"});try{localStorage.removeItem("ailo_token");}catch(e){}}}
            style={{width:"100%",padding:"13px",borderRadius:50,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.08)",color:"#ef4444",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {Ic.logout("#ef4444",17)}<span>تسجيل الخروج</span>
          </button>
        </div>
      </div>)}

      <style>{CSS}</style>

      {/* ── MODAL 1: LANGUAGE PICKER ─────────────────────────── */}
      {showLangPicker&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowLangPicker(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:17,marginBottom:6,textAlign:"center",color:primary,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <div style={{width:32,height:32,borderRadius:16,background:`${primary}22`,border:`1.5px solid ${primary}44`,display:"flex",alignItems:"center",justifyContent:"center",color:primary}}>
                {pendingCallType==="video"
                  ?<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                  :pendingCallType==="voice"
                  ?<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 015 12a19.79 19.79 0 01-3.07-8.67A2 2 0 013.92 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                  :<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>}
              </div>
              اختر اللغة المستهدفة
            </div>
            <div style={{color:muted,fontSize:12,textAlign:"center",marginBottom:18}}>ستُطابَق مع من يتحدث هذه اللغة</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
              {["English","Arabic","French","Spanish","German","Chinese","Japanese","Turkish"].map(lang=>(
                <button key={lang} onClick={()=>{ setTargetLang(lang); doSearch(pendingCallType,lang); }}
                  style={{padding:"14px 10px",borderRadius:14,border:`2px solid ${targetLang===lang?primary:border}`,background:targetLang===lang?`${primary}22`:card,color:targetLang===lang?primary:text,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui",backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s"}}>
                  {{"English":"🇬🇧","Arabic":"🇸🇦","French":"🇫🇷","Spanish":"🇪🇸","German":"🇩🇪","Chinese":"🇨🇳","Japanese":"🇯🇵","Turkish":"🇹🇷"}[lang]} {lang}
                </button>
              ))}
            </div>
            <button onClick={()=>setShowLangPicker(false)} style={{width:"100%",padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui",marginTop:6}}>إلغاء</button>
          </div>
        </div>
      )}

      {/* ── MODAL 2: SEARCH BY ID ─────────────────────────────── */}
      {showUserSearch&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowUserSearch(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:17,marginBottom:6,color:primary}} style={{display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:15,background:"#6366f133",border:"1px solid #6366f144"}}><svg width="15" height="15" viewBox="0 0 24 24" fill="#6366f122" stroke="#818cf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>ابحث عن صديق</div>
            <div style={{color:muted,fontSize:12,marginBottom:14}}>ابحث بـ <strong style={{color:primary}}>ID المستخدم القصير</strong> — مثال: AIL-F أو AIL-K9X2P</div>
            {/* My ID card */}
            <div style={{background:`${primary}11`,border:`1px solid ${primary}33`,borderRadius:14,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,color:muted,marginBottom:3}}>🪪 الـ ID الخاص بك — شاركه مع أصدقائك</div>
                <div style={{color:primary,fontWeight:900,fontSize:17,letterSpacing:2,userSelect:"all"}}>{shortId||"جارٍ التوليد..."}</div>
              </div>
              {shortId===OWNER_SHORT_ID&&<div style={{background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"white",borderRadius:50,padding:"4px 12px",fontSize:11,fontWeight:800,boxShadow:"0 2px 10px rgba(245,158,11,0.5)"}}>👑 OWNER</div>}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value.toUpperCase())} placeholder="AIL-..." style={{...inp,flex:1,letterSpacing:1,fontWeight:700}} onKeyDown={e=>e.key==="Enter"&&searchByUsername()}/>
              <button onClick={searchByUsername} style={btnP({padding:"12px 18px",fontSize:13,flexShrink:0})}>{searchLoading?"⟳":"بحث"}</button>
            </div>
            {searchError&&<div style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:10,padding:"10px 14px",color:"#fca5a5",fontSize:13,marginBottom:14,textAlign:"center"}}>⚠️ {searchError}</div>}
            {searchResult&&Array.isArray(searchResult)&&searchResult.map((u,i)=>(
              <div key={i} style={{...glass({display:"flex",alignItems:"center",gap:12,marginBottom:8})}}>
                <div style={{width:44,height:44,borderRadius:22,overflow:"hidden",flexShrink:0,border:`2px solid ${u.short_id===OWNER_SHORT_ID?"#f59e0b":primary}`}}>
                  {u.avatar?.startsWith("http")?<img src={u.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="" onError={e=>e.target.style.display="none"}/>:<span style={{fontSize:28,lineHeight:"44px",display:"block",textAlign:"center"}}>{u.avatar||"🌍"}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontWeight:700,fontSize:14}}>{u.name}</span>
                    {u.short_id===OWNER_SHORT_ID&&<span style={{fontSize:12}}>👑</span>}
                  </div>
                  <div style={{color:primary,fontWeight:800,fontSize:12,letterSpacing:1,marginTop:1}}>{u.short_id||"—"}</div>
                  <div style={{color:muted,fontSize:11,marginTop:1}}>{(u.xp||0).toLocaleString()} XP</div>
                </div>
                <button onClick={()=>{
                  setSearchResult(null); setShowUserSearch(false);
                  setPartner({av:u.avatar||"🌍",name:u.name||"مستخدم",country:"—"});
                  const rid="direct_"+[userId,u.user_id].sort().join("__").replace(/[^a-zA-Z0-9_]/g,"").slice(0,64);
                  setRoomId(rid); setCallType("text");
                  joinRoom(rid); setScreen("chat");
                }} style={btnP({padding:"9px 14px",fontSize:12,display:"flex",alignItems:"center",gap:6})}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                  دردشة</button>
              </div>
            ))}
            <button onClick={()=>setShowUserSearch(false)} style={{width:"100%",padding:"12px",borderRadius:50,border:`1px solid ${border}`,background:"transparent",color:muted,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إغلاق</button>
          </div>
        </div>
      )}

      {/* ── MODAL 3: PROFILE VIEW ────────────────────────────── */}
      {showProfileView&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowProfileView(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:24})}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{width:90,height:90,borderRadius:45,overflow:"hidden",margin:"0 auto 12px",border:`3px solid ${primary}`,boxShadow:`0 0 0 4px ${glow}`}}>
                {profile.avatar?.startsWith("http")?<img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:60,lineHeight:"90px",display:"block"}}>{profile.avatar}</span>}
              </div>
              <div style={{fontWeight:900,fontSize:20}}>{profile.name}</div>
              <div style={{color:muted,fontSize:13,marginTop:4}}>{profile.status}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                <div style={tag(primary)}>{profile.lang}</div>
                <div style={tag("#22c55e")}>Lv.{lvl.level}</div>
                <div style={tag("#f59e0b")}>{totalXp.toLocaleString()} XP</div>
              </div>
            </div>
            {profile.bio&&<div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:14,padding:"12px 16px",color:muted,fontSize:13,textAlign:"center",marginBottom:16}}>"{profile.bio}"</div>}
            <div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:11,color:muted,textAlign:"center"}}>
              🪪 ID: <span style={{color:primary,fontWeight:900,userSelect:"all",fontSize:14,letterSpacing:2}}>{shortId||"—"}</span>{shortId===OWNER_SHORT_ID&&<span style={{marginRight:6,fontSize:11}}>👑</span>}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowProfileView(false);setShowProfile(true);}} style={btnP({flex:1,fontSize:13})}>✏️ تعديل</button>
              }
                <button onClick={()=>{
                  if(tutorialStep<steps.length-1){ setTutorialStep(t=>t+1); }
                  else{ setShowTutorial(false); save("tutorial_done",true); }
                }} style={btnP({flex:1})}>
                  {tutorialStep<steps.length-1?"التالي ←":"ابدأ الآن 🚀"}
                </button>
              </div>
              <button onClick={()=>{setShowTutorial(false);save("tutorial_done",true);}} style={{background:"none",border:"none",color:muted,fontSize:12,cursor:"pointer",marginTop:12,fontFamily:"'Tajawal',system-ui"}}>تخطي</button>
            </div>
          </div>
        );
      })()}

      {/* ── MODAL 5: COINS INFO ───────────────────────────────── */}
      {showCoinsInfo&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowCoinsInfo(false)}>
          <div style={{...glass({width:"100%",borderRadius:"24px 24px 0 0",padding:22})}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:17,marginBottom:4,color:"#f59e0b"}}>🪙 رصيدك: {coins} عملة</div>
            <div style={{color:muted,fontSize:12,marginBottom:18}}>كيف تربح العملات؟</div>
            {[
              {icon:"💬",desc:"أرسل رسالة في محادثة",coins:"+1"},
              {icon:"📞",desc:"أكمل مكالمة",coins:"+10"},
              {icon:"📚",desc:"أكمل تمرين SRS",coins:"+3"},
              {icon:"✅",desc:"استلام مهمة يومية",coins:"+10"},
              {icon:"🏆",desc:"الفوز في التحدي",coins:"+20"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<4?`1px solid ${border}`:"none"}}>
                <span style={{fontSize:22,flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1,fontSize:13}}>{r.desc}</div>
                <div style={{...tag("#f59e0b"),flexShrink:0}}>{r.coins} 🪙</div>
              </div>
            ))}
            <div style={{background:`${primary}11`,border:`1px solid ${border}`,borderRadius:14,padding:"12px 16px",marginTop:14,fontSize:12,color:muted,textAlign:"center"}}>
              💡 استخدم العملات في <strong style={{color:primary}}>المتجر</strong> للحصول على مزايا حصرية
            </div>
            <button onClick={()=>setShowCoinsInfo(false)} style={btnP({width:"100%",marginTop:14})}>حسناً ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Ailo));
</script>
</body>
</html>
