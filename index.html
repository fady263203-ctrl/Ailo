// ── XP SYSTEM ───────────────────────────────────────────────────────────────
const xpForLevel = (lvl) => lvl === 1 ? 100 : xpForLevel(lvl-1) + lvl * 100;
const getLevelInfo = (totalXp) => {
  let lvl = 1, acc = 0;
  while (acc + xpForLevel(lvl) <= totalXp) { acc += xpForLevel(lvl); lvl++; }
  return { level: lvl, current: totalXp - acc, needed: xpForLevel(lvl), pct: Math.round(((totalXp-acc)/xpForLevel(lvl))*100) };
};

// ── ANIMATED XP BAR ──────────────────────────────────────────────────────────
function XPBar({ pct, color, animated }) {
  const [w, setW] = useState(0);
  useEffect(() => { const t = setTimeout(()=>setW(pct), 300); return ()=>clearTimeout(t); }, [pct]);
  const barColor = pct > 75 ? "#f59e0b" : pct > 50 ? "#6366f1" : "#6366f1";
  return (
    <div style={{height:10, background:"#ffffff22", borderRadius:5, overflow:"hidden", position:"relative"}}>
      <div style={{width:`${w}%`, height:"100%", background:`linear-gradient(90deg,${color},${barColor})`, borderRadius:5, transition:"width 0.8s cubic-bezier(.4,0,.2,1)", boxShadow:w>80?`0 0 10px ${barColor}`:undefined}}/>
    </div>
  );
}

// ── MINI CHART ────────────────────────────────────────────────────────────────
function WeekChart({ data, color }) {
  const max = Math.max(...data);
  return (
    <div style={{display:"flex", alignItems:"flex-end", gap:6, height:60}}>
      {["أح","إث","ث","أر","خ","ج","س"].map((d,i)=>(
        <div key={i} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4}}>
          <div style={{width:"100%", height:50, display:"flex", alignItems:"flex-end"}}>
            <div style={{width:"100%", height:`${(data[i]/max)*100}%`, background:i===6?color:color+"66", borderRadius:"4px 4px 0 0", transition:"height 0.8s ease", minHeight:4}}/>
          </div>
          <span style={{fontSize:9, color:"#888"}}>{d}</span>
        </div>
      ))}
    </div>
  );
}

  useEffect(() => {
    if (screen !== "matching") return;
    const i = setInterval(()=>setSearchTime(s=>s+1), 1000);
    const m = setTimeout(()=>setMatched(true), 4000);
    return ()=>{ clearInterval(i); clearTimeout(m); };
  }, [screen]);

  useEffect(() => {
    if (screen !== "call") return;
    const i = setInterval(()=>setCallTime(s=>s+1), 1000);
    return ()=>clearInterval(i);

  useEffect(()=>{ msgEnd.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);
  useEffect(()=>{ botEnd.current?.scrollIntoView({behavior:"smooth"}); }, [botMessages]);

  // Init SRS card
  useEffect(()=>{
    const card = SRS_CARDS[srsIdx];
    if (card.type==="arrange") setArrangeWords([...card.words].sort(()=>Math.random()-0.5));
    if (card.type==="match") setMatchPairs({});
    setArrangeSelected([]);
    setMatchSelected(null);
    setSrsAnswer(null);
  }, [srsIdx]);

  const fmt = s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const now = ()=>new Date().toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"});
  const startSearch = (type)=>{ setCallType(type); setScreen("matching"); setSearchTime(0); setMatched(false); setCallTime(0); };
  const acceptMatch = ()=>{ addXp(10,"مطابقة"); setScreen(callType==="text"?"chat":"call"); };

  const sendMsg = () => {
    if (!chatInput.trim()) return;
    const newMsg = { id:Date.now(), from:"me", text:chatInput, time:now(), status:"sent" };
    setMessages(p=>[...p, newMsg]);
    setChatInput("");
    addXp(5, "رسالة");
    setIsTyping(true);
    setTimeout(()=>{
      setMessages(p=>p.map(m=>m.id===newMsg.id?{...m,status:"delivered"}:m));
    }, 800);
    const replies=["That's interesting! Tell me more 😊","Wow really? In English we say...","Great! Can you repeat that? 🎯","Perfect! You're improving! ⭐"];
    setTimeout(()=>{
      setIsTyping(false);
      setMessages(p=>[...p.map(m=>m.id===newMsg.id?{...m,status:"read"}:m), { id:Date.now()+1, from:"partner", text:replies[Math.floor(Math.random()*replies.length)], time:now(), status:"read" }]);
    }, 2000);
  };

  const sendBot = () => {
    if (!botInput.trim()) return;
    setBotMessages(p=>[...p, { id:Date.now(), from:"me", text:botInput, time:now() }]);
    setBotInput("");
    setTimeout(()=>setBotMessages(p=>[...p, { id:Date.now()+1, from:"bot", text:BOT_REPLIES[Math.floor(Math.random()*BOT_REPLIES.length)], time:now() }]), 1000);
  };

  const answerSrs = (idx) => {
    const card = SRS_CARDS[srsIdx];
    const correct = idx===card.answer;
    setSrsAnswer(idx);
    if (correct) { setSrsScore(s=>s+1); setSrsStreak(s=>s+1); addXp(15,"إجابة صحيحة"); }
    else setSrsStreak(0);
    setTimeout(()=>{ setSrsIdx(i=>(i+1)%SRS_CARDS.length); }, 1200);
  };

  const submitArrange = () => {
    const card = SRS_CARDS[srsIdx];
    const userAns = arrangeSelected.join(" ");
    const correct = userAns === card.answer;
    setSrsAnswer(correct ? card.answer : "wrong");
    if (correct) { setSrsScore(s=>s+1); addXp(20,"ترتيب صحيح"); }
    setTimeout(()=>setSrsIdx(i=>(i+1)%SRS_CARDS.length), 1200);
  };

  const handleMatch = (word, arabic) => {
    if (!matchSelected) { setMatchSelected(word); return; }
    const newPairs = {...matchPairs, [matchSelected]: arabic };
    setMatchPairs(newPairs);
    setMatchSelected(null);
    if (Object.keys(newPairs).length === 4) { addXp(25,"مطابقة مكتملة"); setTimeout(()=>setSrsIdx(i=>(i+1)%SRS_CARDS.length), 1000); }
  };

  const startSpeech = () => {
    setSpeechActive(true);
    setSpeechResult("");
    setTimeout(()=>{ setSpeechActive(false); setSpeechResult("جيد جداً! نطقك واضح ✅"); addXp(20,"تمرين صوتي"); }, 2500);
  };

  // CHALLENGE
  useEffect(()=>{
    if (!challengeActive) return;
    const i = setInterval(()=>{
      setChallengeTime(t=>{ if (t<=1){ setChallengeActive(false); clearInterval(i); return 0; } return t-1; });
      if (Math.random()>0.6) setChallengeScore(s=>({...s, opp:s.opp+1}));
    }, 1000);
    return ()=>clearInterval(i);

  // ── CARD STYLE ──────────────────────────────────────────────────────────────
  const card = { background:cardBg, border:`1px solid ${borderCol}`, borderRadius:20, padding:"18px" };

  const TABS = [

    {id:"bot",     label:"المساعد",  icon:Ic.chat},
    {id:"history", label:"السجل",    icon:Ic.clock},

        {messages.map(m=>(
          <div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"76%"}}>

                  <div style={{display:"flex",gap:8}}>
                    <input value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="example@email.com" style={{...inp,flex:1,fontSize:13}}/>
                    <button onClick={()=>{ if(emailInput) setProfile(p=>({...p,avatar:`https://www.gravatar.com/avatar/${btoa(emailInput.trim().toLowerCase())}?d=identicon&s=200`})); }} style={{...btnS(t.primary),padding:"10px 14px",fontSize:12,flexShrink:0}}>جلب</button>
                  </div>
                </div>
              )}

              {/* Avatar Gallery */}
              {photoMode==="avatar" && (<>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  {[["female","👩 إناث"],["male","👨 ذكور"]].map(([tab2,label])=>(
                    <button key={tab2} onClick={()=>setAvatarTab(tab2)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${avatarTab===tab2?t.primary:borderCol}`,background:avatarTab===tab2?t.primary+"22":"transparent",color:avatarTab===tab2?t.primary:t.muted,fontSize:12,fontWeight:700,cursor:"pointer"}}>{label}</button>
                  ))}
                </div>

                {avatarTab==="female" && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:10}}>
                    {FEMALE_SEEDS.map(seed=>{
                      const url = femaleUrl(seed);
                      const sel = profile.avatar===url;
                      return (
                        <button key={seed} onClick={()=>setProfile(p=>({...p,avatar:url}))} style={{background:sel?t.primary+"33":"transparent",border:`2px solid ${sel?t.primary:borderCol}`,borderRadius:12,padding:4,cursor:"pointer",overflow:"hidden"}}>
                          <img src={url} style={{width:"100%",aspectRatio:"1",borderRadius:8,display:"block"}} alt={seed} loading="lazy"/>
                        </button>
                      );
                    })}
                  </div>
                )}

                {avatarTab==="male" && (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:10}}>
                    {MALE_SEEDS.map(seed=>{
                      const url = maleUrl(seed);
                      const sel = profile.avatar===url;
                      return (
                        <button key={seed} onClick={()=>setProfile(p=>({...p,avatar:url}))} style={{background:sel?t.primary+"33":"transparent",border:`2px solid ${sel?t.primary:borderCol}`,borderRadius:12,padding:4,cursor:"pointer",overflow:"hidden"}}>
                          <img src={url} style={{width:"100%",aspectRatio:"1",borderRadius:8,display:"block"}} alt={seed} loading="lazy"/>
                        </button>
                      );
                    })}
                  </div>
                )}
              </>)}

              {/* Fields */}
              {[["name","اسم المستخدم"],["bio","نبذة شخصية"],["status","الحالة (Status)"]].map(([k,l])=>(
                <div key={k} style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:t.muted,marginBottom:4}}>{l}</div>
                  <input value={profile[k]||""} onChange={e=>setProfile(p=>({...p,[k]:e.target.value}))} style={inp}/>
                </div>
              ))}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:t.muted,marginBottom:4}}>لغتي الأم</div>
                <select value={profile.lang} onChange={e=>setProfile(p=>({...p,lang:e.target.value}))} style={{...inp}}>
                  {["Arabic","English","French","Spanish","German","Chinese","Japanese","Turkish"].map(l=><option key={l} value={l}>{l}</option>)}
                </select>
              </div>
              {/* Level Progress */}
              <div style={{...card,marginBottom:14,background:t.primary+"22"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontWeight:700}}>المستوى {lvl.level}</span>
                  <span style={{color:t.muted,fontSize:12}}>{lvl.current}/{lvl.needed} XP</span>
                </div>
                <XPBar pct={lvl.pct} color={t.primary}/>
                <div style={{fontSize:11,color:t.muted,marginTop:4}}>يتطلب المستوى {lvl.level+1}: {xpForLevel(lvl.level+1)} XP إضافية</div>
              </div>
              <button onClick={()=>setShowProfile(false)} style={{...btnS(t.primary),width:"100%"}}>حفظ ✓</button>
            </div>
          </div>
        );
      })()}

      {/* SETTINGS MODAL */}
      {showSettings && (
        <div style={{position:"fixed",inset:0,background:"#00000090",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSettings(false)}>
          <div style={{...card,width:"100%",borderRadius:"22px 22px 0 0",padding:22}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:16,textAlign:"center"}}>الإعدادات</div>
            <div style={{fontWeight:700,marginBottom:10}}>🎨 لون التطبيق</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:18}}>
              {Object.entries(THEMES).map(([name,th])=>(
                <button key={name} onClick={()=>setTheme(name)} style={{aspectRatio:"1",borderRadius:12,background:th.primary,border:theme===name?"3px solid white":"3px solid transparent",cursor:"pointer",fontSize:14,color:"white",fontWeight:700}}>
                  {theme===name?"✓":""}
                </button>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontWeight:700}}>🌙 الوضع الداكن</div>
              <button onClick={()=>setDarkMode(d=>!d)} style={{background:darkMode?t.primary:"#ccc",border:"none",borderRadius:50,width:52,height:28,position:"relative",cursor:"pointer"}}>
                <div style={{width:20,height:20,borderRadius:10,background:"white",position:"absolute",top:4,transition:"left 0.2s",left:darkMode?28:4}}/>
              </button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{fontWeight:700}}>🔔 الإشعارات</div>
                <div style={{fontSize:11,color:t.muted,marginTop:2}}>إشعارات الرسائل والمكالمات</div>
              </div>
              <button style={{background:t.primary,border:"none",borderRadius:50,width:52,height:28,position:"relative",cursor:"pointer"}}>
                <div style={{width:20,height:20,borderRadius:10,background:"white",position:"absolute",top:4,left:28}}/>
              </button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{fontWeight:700}}>🔒 التشفير الكامل</div>
                <div style={{fontSize:11,color:"#22c55e",marginTop:2}}>✅ مفعّل دائماً</div>
              </div>
              {Ic.shield("#22c55e",18)}
            </div>
            <button onClick={()=>setShowSettings(false)} style={{...btnS(t.primary),width:"100%"}}>حفظ ✓</button>
          </div>
        </div>
      )}

      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
      `}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Ailo />);
</script>
</body>
</html>
